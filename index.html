<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- CSP notes:
     - 'unsafe-inline' for script-src: the bundled app block is an inline <script> (no nonce).
       Removing this would require a nonce-based approach or external script file.
     - 'unsafe-inline' for style-src: every component uses inline style= props by design.
       Removing this would require a full styling refactor.
     - Google Fonts: font-src and style-src allow fonts.gstatic.com and fonts.googleapis.com
       because the dashboard loads Playfair Display, Newsreader, Inter Tight, Courier Prime.
     - connect-src :3002 is reserved for the Phase 2 history sidecar (not yet built).
     - frame-ancestors 'none': prevents clickjacking.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.kraken.com https://api.coingecko.com https://mempool.space https://api.open-meteo.com https://geocoding-api.open-meteo.com https://api.rss2json.com http://localhost:3001 http://127.0.0.1:3001 http://localhost:3002 http://127.0.0.1:3002; frame-ancestors 'none';">
<title>The Daily Node — Command Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600;1,700;1,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter+Tight:wght@400;500;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #f3eee4;
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    background: inherit;
  }
  #canvas {
    width: calc(var(--u) * 1920);
    height: calc(var(--u) * 1080);
    flex-shrink: 0;
    overflow: hidden;
  }
  /* SYNC: must match isMobile check in updateScale() and useViewportMode(900) in App.jsx */
  @media (max-width: 900px) {
    #canvas { width: 100vw; height: auto; min-height: 100vh; }
    #stage { align-items: flex-start; overflow-y: auto; }
  }
  @keyframes live-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }
  .live-dot {
    display: inline-block;
    width: calc(var(--u) * 6); height: calc(var(--u) * 6);
    border-radius: 50%;
    background: #9c2a1a;
    margin-right: calc(var(--u) * 5);
    position: relative; top: -1px;
    animation: pulse-dot 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }
  .live-dot-static {
    display: inline-block;
    width: calc(var(--u) * 6); height: calc(var(--u) * 6);
    border-radius: 50%;
    background: #b8b0a0;
    margin-right: calc(var(--u) * 5);
    position: relative; top: -1px;
    flex-shrink: 0;
  }
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  a { text-decoration: none; color: inherit; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  /* News column — scrollbar fades in on scroll, out after idle */
  .news-scroll { scrollbar-width: thin; scrollbar-color: rgba(138,130,114,0) transparent; }
  .news-scroll.is-scrolling { scrollbar-color: rgba(138,130,114,0.45) transparent; }
  .news-scroll::-webkit-scrollbar { width: 3px; }
  .news-scroll::-webkit-scrollbar-track { background: transparent; }
  .news-scroll::-webkit-scrollbar-thumb { background: rgba(138,130,114,0); border-radius: 2px; transition: background 0.2s ease; }
  .news-scroll.is-scrolling::-webkit-scrollbar-thumb { background: rgba(138,130,114,0.45); }
  /* Bottom fade — passive hint that content continues */
  .news-col-wrap { position: relative; display: flex; flex-direction: column; min-height: 0; }
  .news-col-wrap::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 48px; background: linear-gradient(to bottom, transparent, var(--paper)); pointer-events: none; transition: opacity 0.3s; }
  .news-col-wrap.at-bottom::after { opacity: 0; }
  :root {
    --u: 1px;       /* updated by JS — scale factor for 1920×1080 design */
    --u-scale: 1;   /* unitless version of --u for CSS transform: scale() */
    --f-serif:    "Playfair Display", Georgia, serif;
    --f-body:     "Newsreader", Georgia, serif;
    --f-sans:     "Inter Tight", system-ui, sans-serif;
    --f-mono:        "Courier Prime", "Courier New", monospace;
    --f-num-display: "Playfair Display", Georgia, serif;
    --f-num:         "Newsreader", Georgia, serif;
    --n-hero:   68px;
    --n-lg:     32px;
    --n-md:     22px;
    --n-sm:     16px;
    --n-xs:     12px;
    --ink:      #16130f;
    --ink2:     #4a4438;
    --ink3:     #8a8272;
    --ink4:     #b8b0a0;
    --paper:    #f3eee4;
    --paper2:   #ebe4d6;
    --rule:     rgba(26,23,20,1);
    --rule2:    rgba(26,23,20,0.18);
    --rule3:    rgba(26,23,20,0.08);
    --orange:   #c8641a;
    --red:      #9c2a1a;
    --green:    #3a6b2e;
  }
</style>
