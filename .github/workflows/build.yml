name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Verify output
        run: |
          test -f "index.html"
          size=$(wc -c < "index.html")
          echo "Bundle size: $size bytes"
          if [ "$size" -lt 50000 ]; then
            echo "ERROR: Bundle suspiciously small (<50KB), build likely broken"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run python tests
        run: npm run test:py
