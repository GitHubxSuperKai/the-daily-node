name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build bundle
        run: npm run build

      - name: Stage Pages artifact
        run: |
          mkdir -p _site/docs/screenshots
          cp "Command Center.html" _site/
          cp "pitch-deck.html" _site/
          cp "docs/pages-index-redirect.html" _site/index.html
          cp docs/screenshots/*.png _site/docs/screenshots/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
