<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Daily Node — Command Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600;1,700;1,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter+Tight:wght@400;500;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #f3eee4;
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    background: inherit;
  }
  #canvas {
    width: calc(var(--u) * 1920);
    height: calc(var(--u) * 1080);
    flex-shrink: 0;
    overflow: hidden;
  }
  @media (max-width: 900px) {
    #canvas { width: 100vw; height: auto; min-height: 100vh; }
    #stage { align-items: flex-start; overflow-y: auto; }
  }
  @keyframes live-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #9c2a1a;
    margin-right: 5px;
    position: relative; top: -1px;
    animation: pulse-dot 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }
  .live-dot-static {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #b8b0a0;
    margin-right: 5px;
    position: relative; top: -1px;
    flex-shrink: 0;
  }
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  a { text-decoration: none; color: inherit; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  /* News column — scrollbar fades in on scroll, out after idle */
  .news-scroll { scrollbar-width: thin; scrollbar-color: rgba(138,130,114,0) transparent; }
  .news-scroll.is-scrolling { scrollbar-color: rgba(138,130,114,0.45) transparent; }
  .news-scroll::-webkit-scrollbar { width: 3px; }
  .news-scroll::-webkit-scrollbar-track { background: transparent; }
  .news-scroll::-webkit-scrollbar-thumb { background: rgba(138,130,114,0); border-radius: 2px; transition: background 0.2s ease; }
  .news-scroll.is-scrolling::-webkit-scrollbar-thumb { background: rgba(138,130,114,0.45); }
  /* Bottom fade — passive hint that content continues */
  .news-col-wrap { position: relative; display: flex; flex-direction: column; min-height: 0; }
  .news-col-wrap::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 48px; background: linear-gradient(to bottom, transparent, var(--paper)); pointer-events: none; transition: opacity 0.3s; }
  .news-col-wrap.at-bottom::after { opacity: 0; }
  :root {
    --u: 1px;       /* updated by JS — scale factor for 1920×1080 design */
    --u-scale: 1;   /* unitless version of --u for CSS transform: scale() */
    --f-serif:    "Playfair Display", Georgia, serif;
    --f-body:     "Newsreader", Georgia, serif;
    --f-sans:     "Inter Tight", system-ui, sans-serif;
    --f-mono:     "Courier Prime", "Courier New", monospace;
    --n-hero:   68px;
    --n-lg:     32px;
    --n-md:     22px;
    --n-sm:     16px;
    --n-xs:     12px;
    --ink:      #16130f;
    --ink2:     #4a4438;
    --ink3:     #8a8272;
    --ink4:     #b8b0a0;
    --paper:    #f3eee4;
    --paper2:   #ebe4d6;
    --rule:     rgba(26,23,20,1);
    --rule2:    rgba(26,23,20,0.18);
    --rule3:    rgba(26,23,20,0.08);
    --orange:   #c8641a;
    --red:      #9c2a1a;
    --green:    #3a6b2e;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="stage"><div id="canvas"></div></div>

<script>
const CANVAS_W = 1920, CANVAS_H = 1080;
function updateScale() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const isMobile = vw < 900;
  const s = isMobile ? 1 : Math.min(vw / CANVAS_W, vh / CANVAS_H);
  const r = document.documentElement;
  r.style.setProperty('--u', s + 'px');
  r.style.setProperty('--u-scale', s);
}
window.addEventListener('resize', updateScale);
window.addEventListener('load', updateScale);
updateScale();
window.updateScale = updateScale;
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, useContext } = React;

/* MODULES CONCATENATED BY build.js */
</script>

</body>
</html>
