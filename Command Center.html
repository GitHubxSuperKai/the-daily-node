            <div>
              <Kicker>Temperature</Kicker>
              <div style={{ display: 'flex', border: `1px solid ${T.rule2}`, marginTop: u(8), width: 'fit-content' }}>
                <button style={toggleBtn(tempUnit === 'fahrenheit')} onClick={() => setTempUnit('fahrenheit')}>°F</button>
                <button style={toggleBtn(tempUnit === 'celsius')} onClick={() => setTempUnit('celsius')}>°C</button>
              </div>
            </div>
          </div>

          <div style={{ display: 'flex', gap: u(10), marginTop: u(24), borderTop: `1px solid ${T.rule2}`, paddingTop: u(18) }}>
            <button style={btnPrimary} onClick={handleSave}>Save</button>
            <button style={btnSecondary} onClick={onClose}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}



function SubLabel({ children, right, alert, rightColor, noBorder, T }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
      paddingBottom: u(6), marginBottom: u(6), ...(!noBorder && { borderBottom: `1px solid ${T.rule3}` }),
    }}>
      <div style={{
        fontFamily: T.sans, fontSize: u(9), fontWeight: 600,
        letterSpacing: u(1.4), textTransform: 'uppercase', color: T.ink3,
      }}>
        {children}
      </div>
      {right && (
        <div style={{
          fontFamily: T.num, fontSize: u(13), fontWeight: 400,
          color: rightColor || (alert ? T.red : T.green),
        }}>
          {right}
        </div>
      )}
    </div>
  );
}

function Row({ label, value, valueColor, valueAlt, last, T }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
      paddingBottom: last ? 0 : u(6),
      borderBottom: last ? 'none' : `1px solid ${T.rule3}`,
    }}>
      <div style={{
        fontFamily: T.sans, fontSize: u(9), fontWeight: 600,
        letterSpacing: u(1.2), textTransform: 'uppercase', color: T.ink3,
      }}>
        {label}
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: u(6) }}>
        {valueAlt && (
          <div style={{
            fontFamily: T.num, fontSize: u(9), fontWeight: 400,
            color: T.ink4, fontFeatureSettings: '"tnum" 1, "lnum" 1',
          }}>
            {valueAlt}
          </div>
        )}
        <div style={{
          fontFamily: T.num, fontSize: u(13), fontWeight: 400,
          color: valueColor || T.ink, fontFeatureSettings: '"tnum" 1, "lnum" 1',
        }}>
          {value}
        </div>
      </div>
    </div>
  );
}

function NetworkStatusWidget({ chain, T }) {
  const latestBlock = (chain.recentBlocks || [])[0];
  const pools = chain.pools || [];
  const d = chain.data;

  const halvings = Math.floor((d?.height || 0) / 210000);
  const halvingBlocks = (halvings + 1) * 210000 - (d?.height || 0);
  const blockSubsidy = 50 / Math.pow(2, halvings);

  const blockIntervalMin = d?.blockTimeMs ? (d.blockTimeMs / 60000).toFixed(1) : '—';
  const bMinRaw = d ? d.blockTimeMs / 60000 : 10;
  const blockIntervalCol = !d ? T.ink
    : bMinRaw < 9.9 ? T.green
    : bMinRaw > 10.1 ? T.red
    : T.ink;

  const diffAdj = d?.diffAdj;
  const diffAdjStr = diffAdj != null ? `${diffAdj >= 0 ? '+' : ''}${diffAdj.toFixed(2)}% est.` : '—';
  const diffAdjCol = diffAdj == null ? T.ink3 : diffAdj > 0 ? T.green : diffAdj < 0 ? T.red : T.ink;
  const diffAdjPct = d?.progressPercent || 0;
  const remainingBlocks = d?.remainingBlocks ?? 0;
  const remainingDays = Math.round(remainingBlocks * 10 / 60 / 24);
  const projectedRetargetDateStr = remainingBlocks > 0
    ? new Date(Date.now() + remainingBlocks * 10 * 60 * 1000).toISOString().slice(0, 10)
    : null;
  const prevDiffAdj = d?.previousDiffAdj;
  const prevDiffAdjStr = prevDiffAdj != null ? `${prevDiffAdj >= 0 ? '+' : ''}${prevDiffAdj.toFixed(2)}%` : '—';
  const prevDiffAdjCol = prevDiffAdj == null ? T.ink4 : prevDiffAdj > 0 ? T.green : prevDiffAdj < 0 ? T.red : T.ink4;
  const prevRetargetDateStr = d?.previousRetargetDate != null
    ? new Date(d.previousRetargetDate * 1000).toISOString().slice(0, 10)
    : null;

  const halvingYrs = (halvingBlocks * 10 / 60 / 24 / 365).toFixed(1);

  const mempoolMBRaw = d ? d.mempoolBytes / 1e6 : null;
  const mempoolLabel = mempoolMBRaw == null ? '—'
    : mempoolMBRaw < 50 ? 'Clear' : mempoolMBRaw < 200 ? 'Moderate' : 'Congested';
  const mempoolColor = mempoolMBRaw == null ? T.ink
    : mempoolMBRaw < 50 ? T.green : mempoolMBRaw < 200 ? T.ink : T.red;
  const feeLow  = d?.feeEco  != null ? `${d.feeEco}`  : '—';
  const feeMid  = d?.feeMid  != null ? `${d.feeMid}`  : '—';
  const feeFast = d?.feeFast != null ? `${d.feeFast}` : '—';

  const blockAge = latestBlock?.timestamp
    ? `${Math.round((Date.now() / 1000 - latestBlock.timestamp) / 60)}m ago`
    : '—';
  const blockWeight = latestBlock?.weight != null
    ? `${(latestBlock.weight / 1e6).toFixed(2)} MWU` : '—';
  const feeSpan = latestBlock?.feeRange?.length >= 2
    ? `${Math.round(latestBlock.feeRange[0])} – ${Math.round(latestBlock.feeRange[latestBlock.feeRange.length - 1])} sat/vB`
    : '—';
  const totalFees = latestBlock?.totalFees != null
    ? `${(latestBlock.totalFees / 1e8).toFixed(4)} BTC` : '—';

  const topPool = pools[0];
  const poolRisk = topPool && parseFloat(topPool.sharePct) > 40;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>

      {/* Masthead */}
      <div style={{
        borderTop: `${u(3)} solid ${T.ink}`, borderBottom: `1px solid ${T.ink}`,
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        padding: `${u(5)} 0`, marginBottom: u(16),
      }}>
        <span style={{
          fontFamily: T.sans, fontSize: u(10), fontWeight: 700,
          letterSpacing: u(2), textTransform: 'uppercase', color: T.ink, whiteSpace: 'nowrap',
        }}>
          Network Status
        </span>
      </div>

      {/* Headline stats 3×2 */}
      <div style={{ marginBottom: u(20) }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: `${u(12)} ${u(10)}` }}>
          {[
            { val: d ? fmtHashrate(d.hashrate) : '—', label: 'Hashrate',      size: 22, color: T.ink },
            { val: `${blockIntervalMin}m`,              label: 'Block Interval', size: 16, color: blockIntervalCol },
            { val: `${halvingBlocks.toLocaleString()} blks`, label: 'Halving', size: 16, color: T.ink, sub: `~${halvingYrs}yr` },
            { val: d ? fmtDiff(d.difficulty)   : '—', label: 'Difficulty',    size: 22, color: T.ink },
            { val: `${blockSubsidy} BTC`,               label: 'Block Reward', size: 16, color: T.ink },
            { val: `${Number((blockSubsidy / 2).toFixed(8))} BTC`, label: 'Next Reward', size: 16, color: T.ink4 },
          ].map(({ val, label, size, color, sub }, i) => (
            <div key={i} style={{ display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
              <div style={{
                fontFamily: T.num, fontSize: u(size), fontWeight: 400,
                color, lineHeight: 1, fontFeatureSettings: '"tnum" 1, "lnum" 1',
              }}>
                {val}
              </div>
              <div style={{
                display: 'flex', alignItems: 'baseline', gap: u(5),
              }}>
                <span style={{
                  fontFamily: T.sans, fontSize: u(9), fontWeight: 600,
                  letterSpacing: u(1.2), textTransform: 'uppercase', color: T.ink3,
                }}>
                  {label}
                </span>
                {sub && (
                  <span style={{
                    fontFamily: T.num, fontSize: u(9), color: T.ink4,
                    fontFeatureSettings: '"tnum" 1, "lnum" 1',
                  }}>
                    {sub}
                  </span>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Difficulty Adjustment */}
      <div style={{ marginBottom: u(20), paddingTop: u(12), borderTop: `1px solid ${T.rule3}` }}>
        <SubLabel right={diffAdjStr} rightColor={diffAdjCol} noBorder T={T}>
          Difficulty Adjustment
        </SubLabel>
        <div style={{ height: u(6), background: T.rule3, marginBottom: u(5), position: 'relative' }}>
          <div style={{
            position: 'absolute', left: 0, top: 0, height: '100%',
            width: `${Math.min(100, diffAdjPct)}%`, background: T.orange,
          }} />
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
          <div style={{ fontFamily: T.num, fontSize: u(10), color: T.ink3, fontFeatureSettings: '"tnum" 1, "lnum" 1' }}>
            {fmtNum(remainingBlocks)} blocks remaining
            {projectedRetargetDateStr && (
              <span style={{ fontFamily: T.num, fontSize: u(9), color: T.ink4 }}> ~ {projectedRetargetDateStr}</span>
            )}
          </div>
          <div style={{ fontFamily: T.num, fontSize: u(10), color: T.ink4, fontFeatureSettings: '"tnum" 1, "lnum" 1' }}>
            ~{remainingDays}d
          </div>
        </div>
        <div style={{ marginTop: u(8), display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <div style={{ fontFamily: T.num, fontSize: u(10), color: T.ink3, fontFeatureSettings: '"tnum" 1, "lnum" 1' }}>
            Previous Adjustment
            {prevRetargetDateStr && (
              <span style={{ fontFamily: T.num, fontSize: u(9), color: T.ink4 }}>: {prevRetargetDateStr}</span>
            )}
          </div>
          <div style={{
            fontFamily: T.num, fontSize: u(10), fontWeight: 400,
            color: prevDiffAdjCol, fontFeatureSettings: '"tnum" 1, "lnum" 1',
          }}>
            {prevDiffAdjStr}
          </div>
        </div>
      </div>

      {/* Mempool */}
      <div style={{ marginBottom: u(20), paddingTop: u(12), borderTop: `1px solid ${T.rule3}` }}>
        <SubLabel right={mempoolLabel} rightColor={mempoolColor} T={T}>
          Mempool
        </SubLabel>
        <div style={{ display: 'flex', flexDirection: 'column', gap: u(5) }}>
          <Row label="Pending Txs" value={d ? fmtNum(d.mempoolTx) : '—'} T={T} />
          <Row label="Size" value={d ? `${(d.mempoolBytes / 1e6).toFixed(1)} MB` : '—'} T={T} />
          <Row
            label="Low · Mid · Fast"
            value={`${feeLow} · ${feeMid} · ${feeFast} sat/vB`}
            T={T}
            last
          />
        </div>
      </div>

      {/* Latest Block */}
      <div style={{ marginBottom: u(20), paddingTop: u(12), borderTop: `1px solid ${T.rule3}` }}>
        <SubLabel right={blockAge} rightColor={T.ink3} T={T}>
          Latest Block
        </SubLabel>
        {latestBlock ? (
          <>
            <div style={{
              fontFamily: T.num, fontSize: u(24), fontWeight: 400,
              color: T.ink, lineHeight: 1, marginBottom: u(8), fontFeatureSettings: '"tnum" 1, "lnum" 1',
            }}>
              #{fmtNum(latestBlock.height)}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: u(5) }}>
              <Row label="Transactions" value={fmtNum(latestBlock.txCount)} T={T} />
              <Row label="Block Weight" value={blockWeight} T={T} />
              <Row label="Block Size"   value={fmtBlockSize(latestBlock.size)} T={T} />
              <Row label="Fee Span"     value={feeSpan} T={T} />
              <Row label="Median Fee"   value={latestBlock.medianFee != null ? `${latestBlock.medianFee} sat/vB` : '—'} T={T} />
              <Row label="Total Fees"   value={totalFees} T={T} />
              <Row label="Mined By"     value={latestBlock.poolName || '—'} T={T} last />
            </div>
          </>
        ) : (
          <div style={{ fontFamily: T.num, fontSize: u(14), color: T.ink4 }}>—</div>
        )}
      </div>

      {/* Mining Pools */}
      {pools.length > 0 && (
        <div style={{ paddingTop: u(12), borderTop: `1px solid ${T.rule3}` }}>
          <SubLabel
            right={poolRisk ? 'Concentration ⚠' : null}
            alert={poolRisk}
            T={T}
          >
            Mining Pools · 1,008 Blocks
          </SubLabel>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {pools.map((pool, i) => {
              const share = parseFloat(pool.sharePct);
              const isRisk = share > 40;
              return (
                <div key={i} style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: `${u(5)} 0`,
                  borderBottom: i < pools.length - 1 ? `1px solid ${T.rule3}` : 'none',
                }}>
                  <div style={{
                    fontFamily: T.sans, fontSize: u(12), fontWeight: 400, color: T.ink2,
                    width: u(72), flexShrink: 0, overflow: 'hidden',
                    textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                  }}>
                    {pool.name}
                  </div>
                  <div style={{
                    flex: 1, height: u(2), background: T.rule3, margin: `0 ${u(8)}`, position: 'relative',
                  }}>
                    <div style={{
                      position: 'absolute', left: 0, top: 0, height: '100%',
                      width: `${share}%`, background: isRisk ? T.red : T.ink3,
                    }} />
                  </div>
                  <div style={{
                    fontFamily: T.num, fontSize: u(12), fontWeight: 400,
                    color: isRisk ? T.red : T.ink, fontFeatureSettings: '"tnum" 1, "lnum" 1',
                    width: u(38), textAlign: 'right', flexShrink: 0,
                  }}>
                    {pool.sharePct}%
                  </div>
                  <div style={{
                    fontFamily: T.num, fontSize: u(11), color: T.ink3,
                    width: u(28), textAlign: 'right', flexShrink: 0, fontFeatureSettings: '"tnum" 1, "lnum" 1',
                  }}>
                    {fmtNum(pool.blockCount || 0)}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}



















/**
 * CommandCenter — Main layout orchestrator
 * Renders a responsive 4-column newspaper dashboard on desktop/TV,
 * and a single-column scrollable view on mobile (< 900px).
 *
 * Layout uses CSS --u variable (set by index.html) so all dimensions
 * scale proportionally across 4K, 2K, 1080p, and smaller screens.
 */
function LeadImage({ src, domain }) {
  const T = useT();
  const [errored, setErrored] = React.useState(false);
  if (errored) {
    return (
      <div style={{
        width: '100%',
        height: u(80),
        background: `repeating-linear-gradient(45deg, ${T.rule3} 0, ${T.rule3} 1px, transparent 0, transparent 8px)`,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        borderRadius: 3,
      }}>
        <span style={{ fontFamily: T.mono, fontSize: u(10), color: T.ink4 }}>{domain}</span>
      </div>
    );
  }
  return (
    <img
      src={src}
      alt=""
      style={{ width: '100%', height: u(160), objectFit: 'cover', borderRadius: 3, display: 'block' }}
      onError={() => setErrored(true)}
    />
  );
}

const isFresh = t => t === 'just now' || /^\d+s ago$/.test(t) || /^[1-4]m ago$/.test(t);

function CommandCenter({
  dark,
  onToggleDark,
  bitaxeApiUrl,
  bitaxeIps,
  prefs,
  settingsOpen,
  onOpenSettings,
  onSaveSettings,
  onCloseSettings,
}) {
  const T = useT();
  const { isMobile } = useLayoutSize();
  const clock = useClock(prefs.timeFormat);
  const btc = useBTC();
  const chain = useChain();
  const bitaxe = useBitaxe(bitaxeApiUrl, bitaxeIps);
  const weather = useWeather(prefs.lat, prefs.lng, prefs.tempUnit);
  const rss = useRSS();

  const autoThemeDone = React.useRef(false);
  React.useEffect(() => {
    if (autoThemeDone.current) return;
    const wx = weather.data;
    if (!wx?.wxSunriseHr && wx?.wxSunriseHr !== 0) return;
    const hr = new Date().getHours();
    const shouldBeDark = hr < wx.wxSunriseHr || hr >= wx.wxSunsetHr;
    if (shouldBeDark !== dark) onToggleDark();
    autoThemeDone.current = true;
  }, [weather.data?.wxSunriseHr]);

  const feedHealth = useFeedHealth([
    { lastOk: btc.lastOk, interval: INTERVALS.BTC },
    { lastOk: chain.lastOk, interval: INTERVALS.CHAIN },
    { lastOk: bitaxe.lastOk, interval: INTERVALS.BITAXE },
    { lastOk: weather.lastOk, interval: INTERVALS.WEATHER },
    { lastOk: rss.lastOk, interval: INTERVALS.RSS },
  ]);

  // Derived values
  const btcPrice = btc.data ? `$${fmtPrice(btc.data.price)}` : '—';
  const btcChgPct = btc.data ? fmtPct(btc.data.chgPct) : '—';
  const btcUp = btc.data ? btc.data.chgPct >= 0 : true;
  const btcHi = btc.data ? fmtPrice(btc.data.hi) : '—';
  const btcLo = btc.data ? fmtPrice(btc.data.lo) : '—';
  const btcCap = btc.data?.cap != null ? `$${(btc.data.cap / 1e12).toFixed(2)}T` : '—';
  const btcVol = btc.data ? fmtVolUsd(btc.data.volBtc * btc.data.price) : '—';
  const athPct = btc.data?.ath ? ((btc.data.price - btc.data.ath) / btc.data.ath) * 100 : null;
  const athAtNew = athPct != null && athPct >= 0;

  const blockHeight = chain.data ? fmtNum(chain.data.height) : '—';
  const hashrate = chain.data ? fmtHashrate(chain.data.hashrate) : '—';
  const halvings = chain.data ? Math.floor(chain.data.height / 210000) : null;
  const blockReward = halvings != null ? 50 / Math.pow(2, halvings) : null;
  const rewardEra = halvings != null ? halvings + 1 : null;
  const blockRewardStr = blockReward != null
    ? (blockReward >= 0.001 ? `${blockReward} BTC` : `${blockReward.toFixed(8)} BTC`)
    : null;
  const difficulty = chain.data ? fmtDiff(chain.data.difficulty) : '—';
  const mempoolMB = chain.data ? fmtMempoolMB(chain.data.mempoolBytes) : '—';
  const mempoolTx = chain.data ? fmtNum(chain.data.mempoolTx) : '—';
  const feeFast = chain.data ? `${chain.data.feeFast} sat/vB` : '—';
  const feeEco = chain.data ? `${chain.data.feeEco} sat/vB` : '—';

  // BitAxe fleet derived
  const onlineMiners = bitaxe.miners.filter((m) => m.online && m.data);
  const minerCount = bitaxe.miners.length;
  const onlineCount = onlineMiners.length;
  const totalHashrateTHS = onlineMiners.reduce((sum, m) => sum + ((m.data.hashRate || 0) / 1000), 0);
  const totalPower = onlineMiners.reduce((sum, m) => sum + (m.data.power || 0), 0);
  const combinedEff = totalHashrateTHS > 0 ? (totalPower / totalHashrateTHS).toFixed(1) : '—';

  const soloOdds =
    chain.data && totalHashrateTHS > 0 ? calcSoloOdds(chain.data.hashrate / 1e18, totalHashrateTHS) : null;
  const etaStr = soloOdds ? `~${fmtNum(soloOdds.etaYears)} yrs` : '—';

  const diffAdjVal = chain.data?.diffAdj;
  const diffAdjStr = diffAdjVal != null ? `${diffAdjVal >= 0 ? '+' : ''}${diffAdjVal.toFixed(2)}%` : '—';
  const diffAdjCol = diffAdjVal != null ? (diffAdjVal >= 0 ? T.green : T.red) : T.ink;
  const epochPct = chain.data?.progressPercent;
  const epochBlocks = chain.data ? Math.round((epochPct / 100) * 2016) : null;
  const epochStr = epochPct != null ? `${epochPct.toFixed(0)}% · ${epochBlocks}/2016` : '—';
  const retargetDate = chain.data?.estimatedRetargetDate
    ? new Date(chain.data.estimatedRetargetDate).toISOString().slice(0, 10)
    : '—';
  const blockTimeSec = chain.data?.blockTimeMs ? chain.data.blockTimeMs / 1000 : null;
  const blockTimeCol =
    blockTimeSec == null ? T.ink : blockTimeSec < 570 ? T.orange : blockTimeSec <= 630 ? T.green : T.red;
  const blocksToClr = chain.data ? Math.ceil(chain.data.mempoolBytes / 1_000_000) : null;
  const blocksToClrCol = blocksToClr == null ? T.ink : blocksToClr <= 2 ? T.green : blocksToClr <= 8 ? T.ink : T.red;
  const rawFeeFast = chain.data?.feeFast;
  const rawFeeEco = chain.data?.feeEco;
  const feeFastCol = rawFeeFast == null ? T.ink : rawFeeFast < 10 ? T.green : rawFeeFast < 50 ? T.ink : T.red;
  const feeEcoCol = rawFeeEco == null ? T.ink : rawFeeEco < 5 ? T.green : rawFeeEco < 20 ? T.ink : T.red;
  const rawMempoolMB = chain.data ? chain.data.mempoolBytes / 1e6 : null;
  const mempoolCol =
    rawMempoolMB == null ? T.ink : rawMempoolMB < 10 ? T.green : rawMempoolMB < 50 ? T.ink : T.red;
  const rawMempoolTx = chain.data?.mempoolTx;
  const mempoolTxCol =
    rawMempoolTx == null ? T.ink : rawMempoolTx < 5000 ? T.green : rawMempoolTx < 20000 ? T.ink : T.red;

  const miningRows = [
    { k: 'Hashrate', v: hashrate },
    { k: 'Difficulty', v: difficulty },
    { k: 'Avg block', v: chain.data?.blockTimeMs ? fmtBlockTime(chain.data.blockTimeMs) : '—', c: blockTimeCol },
    { k: 'Diff retarget', v: diffAdjStr, c: diffAdjCol },
    { k: 'Retarget in', v: chain.data?.remainingBlocks != null ? `${fmtNum(chain.data.remainingBlocks)} blk` : '—' },
    { k: 'Retarget date', v: retargetDate },
    { k: 'Epoch', v: epochStr },
  ];
  const chainStatRows = [
    { k: 'Block height', v: blockHeight },
    { k: 'Circulating', v: chain.data ? chain.data.circulating : '—' },
    { k: 'Next halving', v: chain.data ? chain.data.nextHalvingDate : '—' },
  ];
  const mempoolRows = [
    { k: 'Size', v: mempoolMB, c: mempoolCol },
    { k: 'Tx count', v: mempoolTx, c: mempoolTxCol },
    { k: 'Blocks to clear', v: blocksToClr != null ? `${blocksToClr} blk` : '—', c: blocksToClrCol },
    { k: 'Fee · fast', v: feeFast, c: feeFastCol },
    { k: 'Fee · eco', v: feeEco, c: feeEcoCol },
    ...(chain.mempoolBlocks || []).map((b, i) => ({
      k: `${i === 0 ? 'Next blk' : `+${i} blk`} · ${fmtNum(b.nTx)} tx`,
      v: b.feeRange ? `${b.feeRange[0]}–${b.feeRange[1]} s/vB` : `${b.medianFee} s/vB`,
    })),
  ];

  const sys = [
    { k: 'miners', v: bitaxe.err ? 'err' : onlineCount > 0 ? 'ok' : bitaxe.loading ? '…' : 'err', d: bitaxe.loading ? 'connecting' : `${onlineCount}/${minerCount} online` },
    { k: 'mempool', v: chain.err ? 'err' : chain.data ? 'ok' : '…', d: chain.data ? `${mempoolMB}` : '—' },
    { k: 'kraken', v: btc.err ? 'err' : btc.data ? 'ok' : '…', d: btc.data ? `${btcChgPct}% 24h` : '—' },
    { k: 'weather', v: weather.err ? 'err' : weather.data ? 'ok' : '…', d: weather.data ? weather.data.wxCond.toLowerCase() : '—' },

          return (
            <div style={{ borderRight: `1px solid ${T.rule2}`, paddingRight: u(24), overflow: 'hidden', display: 'flex', flexDirection: 'column', minHeight: 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <Kicker>Bitcoin news</Kicker>
                {rss.err && <Kicker color={T.red}>feed error</Kicker>}
              </div>
              <div className={`news-col-wrap${newsItems.length < 8 ? ' at-bottom' : ''}`} style={{ marginTop: u(8), flex: 1, minHeight: 0 }}>
                <div
                  className="news-scroll"
                  style={{ height: '100%', overflowY: 'auto' }}
                  onScroll={(e) => {
                    const el = e.currentTarget;
                    const wrap = el.parentElement;
                    el.classList.add('is-scrolling');
                    clearTimeout(wrap._st);
                    wrap._st = setTimeout(() => el.classList.remove('is-scrolling'), 1200);
                    wrap.classList.toggle('at-bottom', el.scrollHeight - el.scrollTop - el.clientHeight < 4);
                  }}
                >
                  {newsItems.length > 0 ? grouped.map(({ topic, group }) => (
                    <React.Fragment key={topic}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: u(10), padding: `${u(10)} 0 ${u(6)}` }}>
                        <div style={{ flex: 1, borderTop: `1px solid ${T.rule2}` }} />
                        <span style={{ fontFamily: T.sans, fontSize: u(9), fontWeight: 600, letterSpacing: u(2.5), textTransform: 'uppercase', color: T.ink4 }}>{topic}</span>
                        <div style={{ flex: 1, borderTop: `1px solid ${T.rule2}` }} />
                      </div>
                      {group.map((it, i) => (
                        <a
                          key={it.link || i}
                          href={it.link}
                          target="_blank"
                          rel="noopener noreferrer"
                          style={{
                            display: 'block',
                            padding: `${u(8)} 0`,
                            borderBottom: `1px solid ${T.rule3}`,
                            borderLeft: it.topic === 'BREAKING' ? `${u(3)} solid ${T.red}` : 'none',
                            paddingLeft: it.topic === 'BREAKING' ? u(10) : 0,
                          }}
                        >
                          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: u(4) }}>
                            <Kicker color={it.topic === 'BREAKING' ? T.red : T.ink3}>{it.cat}</Kicker>
                            <span style={{ fontFamily: T.num, fontSize: u(10), color: isFresh(it.t) ? T.orange : T.ink3 }}>{it.t}</span>
                          </div>
                          <div style={{ fontFamily: T.body, fontSize: u(14.5), lineHeight: 1.3, color: T.ink, letterSpacing: u(-0.1) }}>
                            {it.hed}
                          </div>
                          <div style={{ fontFamily: T.body, fontStyle: 'italic', fontSize: u(11), color: T.ink3, marginTop: u(2) }}>
                            {it.src}
                          </div>
                        </a>
                      ))}
                    </React.Fragment>
                  )) : (
                    <div style={{ fontFamily: T.num, fontSize: u(12), color: T.ink3, marginTop: u(16) }}>
                      {rss.err ? 'All feeds unavailable' : 'Loading headlines…'}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })()}

        {/* COL 3 — FIELD REPORT + CHAIN VITALS */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 0, overflow: 'hidden' }}>
          <Miners bitaxe={bitaxe} chain={chain} />
          <div className="news-col-wrap" style={{ marginTop: u(32), flexShrink: 1, minHeight: 0 }}>
            <div
              className="no-scrollbar"
              style={{ height: '100%', overflowY: 'auto' }}
              onScroll={(e) => {
                const el = e.currentTarget;
                el.parentElement.classList.toggle('at-bottom', el.scrollHeight - el.scrollTop - el.clientHeight < 4);
              }}
            >
              <NetworkStatusWidget chain={chain} T={T} />
            </div>
          </div>
        </div>
      </div>

      {settingsOpen && (
        <MastheadPanel
          apiUrl={bitaxeApiUrl}
          ips={bitaxeIps}
          prefs={prefs}
          onSave={onSaveSettings}
          onClose={onCloseSettings}
        />
      )}
    </div>
  );
}















/**
 * App - Root React Component
 *
 * Orchestrates all hooks and manages global app state:
 * - Dark mode toggle
 * - Settings panel visibility
 * - User preferences (location, time format, temp unit)
 *
 * Renders CommandCenter with all data passed as props.
 */
function App() {
  // ─── Dark Mode ────────────────────────────────────────────
  const [dark, setDark] = React.useState(false);

  // ─── Settings Panel ───────────────────────────────────────
  const [settingsOpen, setSettingsOpen] = React.useState(false);

  // ─── BitAxe Configuration (with localStorage persistence) ──
  const loadSavedBitAxe = () => {
    try {
      return JSON.parse(localStorage.getItem('dailynode-bitaxe') || '{}');
    } catch {
      return {};
    }
  };
  const [bitaxeApiUrl, setBitaxeApiUrl] = React.useState(() => {
    const s = loadSavedBitAxe();
    return s.apiUrl !== undefined ? s.apiUrl : CONFIG.BITAXE_API_URL;
  });
  const [bitaxeIps, setBitaxeIps] = React.useState(() => {
    const s = loadSavedBitAxe();
    return s.ips !== undefined ? s.ips : CONFIG.BITAXE_IPS;
  });

  // ─── User Preferences (with localStorage persistence) ──────
  const loadSavedPrefs = () => {
    try {
      return JSON.parse(localStorage.getItem('dailynode-prefs') || '{}');
    } catch {
      return {};
    }
  };
  const [prefs, setPrefs] = React.useState(() => {
    const s = loadSavedPrefs();
    return {
      lat: s.lat ?? CONFIG.WEATHER_LAT,
      lng: s.lng ?? CONFIG.WEATHER_LNG,
      cityName: s.cityName ?? '',
      timeFormat: s.timeFormat ?? '12h',
      tempUnit: s.tempUnit ?? 'fahrenheit',
    };
  });

  // ─── Call All Hooks ───────────────────────────────────────
  const clock = useClock(prefs.timeFormat);
  const btc = useBTC();
  const chain = useChain();
  const bitaxe = useBitaxe(bitaxeApiUrl, bitaxeIps);
  const weather = useWeather(prefs.lat, prefs.lng, prefs.tempUnit);
  const rss = useRSS();
  const feedHealth = useFeedHealth([btc, chain, weather, rss]);

  // ─── Auto-Refresh (tab refocus + network restore) ─────────
  usePageRefresh([btc.refresh, chain.refresh, rss.refresh, weather.refresh, bitaxe.refresh]);

  // ─── Theme Selection ──────────────────────────────────────
  const theme = dark ? DARK : LIGHT;

  // ─── Effects ──────────────────────────────────────────────
  // Apply canvas scaling if available
  React.useEffect(() => {
    if (window.applyScale) {
      window.applyScale();
    }
  }, []);

  // Apply theme to document
  React.useEffect(() => {
    document.documentElement.style.setProperty('--paper', dark ? DARK.paper : LIGHT.paper);
  }, [dark]);

  // ─── Event Handlers ───────────────────────────────────────
  const handleToggleDark = () => {
    setDark(prev => {
      const next = !prev;
      document.body.style.background = next ? DARK.paper : LIGHT.paper;
      document.documentElement.style.setProperty('--paper', next ? DARK.paper : LIGHT.paper);
      return next;
    });
  };

  const handleSaveSettings = (newApiUrl, newIps, newPrefs) => {
    setBitaxeApiUrl(newApiUrl);
    setBitaxeIps(newIps);
    localStorage.setItem('dailynode-bitaxe', JSON.stringify({ apiUrl: newApiUrl, ips: newIps }));
    setPrefs(newPrefs);
    localStorage.setItem('dailynode-prefs', JSON.stringify(newPrefs));
    setSettingsOpen(false);
  };

  // ─── Render ────────────────────────────────────────────────
  return (
    <ThemeCtx.Provider value={theme}>
      <CommandCenter
        dark={dark}
        onToggleDark={handleToggleDark}
        bitaxeApiUrl={bitaxeApiUrl}
        bitaxeIps={bitaxeIps}
        prefs={prefs}
        settingsOpen={settingsOpen}
        onOpenSettings={() => setSettingsOpen(true)}
        onSaveSettings={handleSaveSettings}
        onCloseSettings={() => setSettingsOpen(false)}
        clock={clock}
        btc={btc}
        chain={chain}
        bitaxe={bitaxe}
        weather={weather}
        rss={rss}
        feedHealth={feedHealth}
      />
    </ThemeCtx.Provider>
  );
}

// ─── Mount to DOM ──────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('canvas'));
root.render(<App />);

</script>
