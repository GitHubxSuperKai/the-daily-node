<script>
const CANVAS_W = 1920, CANVAS_H = 1080;
function applyScale() {
  const canvas = document.getElementById('canvas');
  const s = Math.min(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H);
  canvas.style.transform = `scale(${s})`;
}
window.addEventListener('resize', applyScale);
window.addEventListener('load', applyScale);
// Run immediately as well — before load fires
applyScale();
window.applyScale = applyScale;
</script>

<script type="text/babel">
// ─── USER CONFIG ──────────────────────────────────────────────
// Edit these to match your setup before opening in the browser.

  WEATHER_LAT: 37.7749,

// ─── Refresh intervals (ms) ───────────────────────────────────
const INTERVALS = {
  CLOCK:    1000,
  BTC:     30000,
  CHAIN:   60000,
  BITAXE:  10000,
  WEATHER: 15 * 60 * 1000,
  RSS:      5 * 60 * 1000,

// ─── Design tokens ────────────────────────────────────────────
const FONTS = {
  serif: '"Fraunces", Georgia, serif',
  body:  '"Newsreader", Georgia, serif',
  sans:  '"Inter Tight", system-ui, sans-serif',
  mono:  '"JetBrains Mono", ui-monospace, monospace',
};
const LIGHT = {
  ...FONTS,
  ink: '#16130f', ink2: '#4a4438', ink3: '#8a8272', ink4: '#b8b0a0',
  paper: '#f3eee4', paper2: '#ebe4d6', paperHi: '#faf6ec',
  rule: 'rgba(26,23,20,1)', rule2: 'rgba(26,23,20,0.18)', rule3: 'rgba(26,23,20,0.08)',
  orange: '#c8641a', red: '#9c2a1a', green: '#3a6b2e',
};
const DARK = {
  ...FONTS,
  ink: '#e8e2d6', ink2: '#a8a090', ink3: '#706858', ink4: '#504840',
  paper: '#121110', paper2: '#1c1a17', paperHi: '#1f1d1a',
  rule: 'rgba(232,226,214,0.85)', rule2: 'rgba(232,226,214,0.12)', rule3: 'rgba(232,226,214,0.06)',
  orange: '#d4743a', red: '#c44040', green: '#5a9b4e',
};
const ThemeCtx = React.createContext(LIGHT);
function useT() { return React.useContext(ThemeCtx); }

// ─── Helpers ──────────────────────────────────────────────────
function fmtNum(n, decimals = 0) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtPrice(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n >= 0 ? '+' : '';
  return `${sign}${Number(n).toFixed(2)}`;
}
function fmtVolUsd(v) {
  if (v == null || isNaN(v)) return '—';
  return v >= 1e9 ? `$${(v / 1e9).toFixed(1)}B` : `$${Math.round(v / 1e6)}M`;
}
function fmtBlockTime(ms) {
  const s = Math.round(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}m ${s % 60}s`;
}
function fmtHashrate(ehsRaw) {
  // mempool returns H/s
  const ehs = ehsRaw / 1e18;
  return ehs >= 1 ? `${ehs.toFixed(0)} EH/s` : `${(ehsRaw / 1e15).toFixed(1)} PH/s`;
}
function fmtDiff(d) {
  if (d >= 1e12) return `${(d / 1e12).toFixed(1)} T`;
  if (d >= 1e9)  return `${(d / 1e9).toFixed(1)} B`;
  return fmtNum(d);
}
function fmtMempoolMB(bytes) {
  return `${(bytes / 1e6).toFixed(0)} MB`;
}
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff <= 0)   return 'just now';
  if (diff < 60)   return `${Math.round(diff)}s ago`;
  if (diff < 3600) return `${Math.round(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.round(diff / 3600)}h ago`;
  return `${Math.round(diff / 86400)}d ago`;
}

// WMO weather code → Meteocons icon name (day/night aware, wind override)
function wmoIcon(code, hr, windMph, sunriseHr, sunsetHr) {
  const night = hr !== undefined && (
    sunriseHr != null && sunsetHr != null
      ? (hr < sunriseHr || hr >= sunsetHr)
      : (hr < 6 || hr >= 20)            // fallback before sunrise/sunset loads
  );
  if (windMph != null && windMph >= 25 && code <= 2) return 'wind';
  if (code <= 1)                                     return night ? 'clear-night'          : 'clear-day';
  if (code === 2)                                    return night ? 'partly-cloudy-night'  : 'partly-cloudy-day';
  if (code === 3)                                    return 'overcast';
  if (code === 45 || code === 48)                    return 'fog';
  if ((code >= 71 && code <= 77) || code === 85 || code === 86) return 'snow';
  if (code >= 95)                                    return 'thunderstorms';
  if (code >= 51 && code <= 55)                      return 'drizzle';
  if (code >= 51)                                    return 'rain';
  return night ? 'partly-cloudy-night' : 'partly-cloudy-day';
}
// Animation speed tied to condition intensity — higher = slower, lower = faster
function wmoSpeed(code, windMph) {
  if (windMph != null && windMph >= 25 && code <= 2) {
    // Wind icon: faster as mph climbs (25→1.0, 40→0.7, 60→0.45)
    return Math.max(0.4, 1.0 - (windMph - 25) / 60);
  }
  if (code === 0)                return 3.0;  // clear — lazy spin
  if (code <= 2)                 return 2.5;  // partly cloudy — gentle
  if (code === 3)                return 2.0;  // overcast
  if (code === 45 || code === 48) return 3.5; // fog — barely moving
  if (code === 51)               return 3.2;  // light drizzle — very slow mist
  if (code === 53)               return 2.8;  // drizzle
  if (code === 55)               return 2.2;  // heavy drizzle
  if (code === 56)               return 3.0;  // light freezing drizzle
  if (code === 57)               return 2.4;  // heavy freezing drizzle
  if (code === 61)               return 2.4;  // light rain
  if (code === 63)               return 1.8;  // rain
  if (code === 65)               return 1.2;  // heavy rain
  if (code === 66)               return 2.0;  // light freezing rain
  if (code === 67)               return 1.4;  // heavy freezing rain
  if (code >= 80 && code <= 82)  return Math.max(0.8, 2.0 - (code - 80) * 0.5); // showers
  if (code === 71)               return 3.0;  // light snow — slow flutter
  if (code === 73)               return 2.4;  // snow
  if (code === 75)               return 1.8;  // heavy snow
  if (code >= 95)                return Math.max(0.5, 0.8 - (code - 95) * 0.1); // thunderstorm — fast; heavier = faster
  return 2.5;
}
function wmoDesc(code) {
  const m = {
    0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
    45:'Fog', 48:'Icy fog',
    51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
    61:'Light rain', 63:'Rain', 65:'Heavy rain',
    71:'Light snow', 73:'Snow', 75:'Heavy snow', 77:'Snow grains',
    80:'Rain showers', 81:'Heavy showers', 82:'Violent showers',
    85:'Snow showers', 86:'Heavy snow showers',
    95:'Thunderstorm', 96:'Thunderstorm w/ hail', 99:'Heavy thunderstorm',
  };
  return m[code] || 'Unknown';
}

// Solo-block odds from network hashrate and miner hashrate
function calcSoloOdds(networkEHS, minerTHS) {
  if (!networkEHS || !minerTHS) return null;
  const networkTHS = networkEHS * 1e6; // EH/s → TH/s
  const sharePerDay = (minerTHS / networkTHS) * 144; // 144 blocks/day
  if (sharePerDay <= 0) return null;
  const oddsPerDay = Math.round(1 / sharePerDay);
  const etaYears = Math.round((1 / sharePerDay) / 365);
  return { oddsPerDay, etaYears };
}

// Halving info from block height
function nextHalving(height) {
  const halvingInterval = 210000;
  const nextHalvingBlock = Math.ceil((height + 1) / halvingInterval) * halvingInterval;
  const blocksRemaining = nextHalvingBlock - height;
  const daysRemaining = blocksRemaining / 144;
  const date = new Date(Date.now() + daysRemaining * 86400000);
  return date.toISOString().slice(0, 10);
}

// Circulating supply from height
function circulatingBTC(height) {
  let supply = 0, reward = 50, h = 0;
  while (h + 210000 <= height) { supply += 210000 * reward; reward /= 2; h += 210000; }
  supply += (height - h) * reward;
  return `${(supply / 1e6).toFixed(2)}M BTC`;
}

// ─── Unified number component ─────────────────────────────────
const NUM_PX = { hero: 64, lg: 28, md: 20, sm: 15, xs: 12 };
function Num({ size = 'md', value, unit, delta, deltaUp, style = {} }) {
  const T = useT();
  const px = NUM_PX[size];
  return (

      {delta && <span style={{ fontFamily: T.mono, fontSize: Math.max(10, px * 0.46), color: deltaUp ? T.orange : T.ink3, marginLeft: 3 }}>
        {deltaUp ? '▲ ' : '▼ '}{delta}
      </span>}
    </span>
  );
}

// ─── Typography atoms ─────────────────────────────────────────

  const T = useT();
  return <div style={{ fontFamily: T.sans, fontSize: 10, fontWeight: 600, letterSpacing: 1.8, textTransform: 'uppercase', color: color || T.ink3, ...style }}>{children}</div>;
}
function Rule({ double, dash, weight = 1, style = {} }) {
  const T = useT();
  if (double) return <div style={{ borderTop: '2px solid ' + T.rule, borderBottom: '1px solid ' + T.rule, height: 5, ...style }} />;
  return <div style={{ borderTop: `${weight}px ${dash ? 'dashed' : 'solid'} ${T.rule2}`, ...style }} />;
}
function ItalicDeck({ children, style = {} }) {
  const T = useT();
  return <div style={{ fontFamily: T.body, fontStyle: 'italic', fontSize: 18, lineHeight: 1.45, color: T.ink2, ...style }}>{children}</div>;
}

// ─── Real chart from price data ────────────────────────────────
function LineChart({ w, h, color, points, fill, vwap }) {
  const T = useT();
  color = color ?? T.orange;
  // points: array of [timestamp, price] pairs, or null for placeholder
  const useFallback = !points || points.length < 2;
  let pts = [];

  if (useFallback) {
    // deterministic placeholder while loading
    let s = 12347;
    const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    for (let i = 0; i <= 80; i++) {
      const x = (i / 80) * w;
      const base = Math.sin(i * 0.18) * h * 0.3 + Math.sin(i * 0.42) * h * 0.08 + (i / 80) * h * 0.18;
      const y = h * 0.6 - base + (rnd() - 0.5) * 2;
      pts.push([x.toFixed(1), Math.max(2, Math.min(h - 2, y)).toFixed(1)]);
    }
  } else {
    const prices = points.map(p => p[1]);
    const minP = Math.min(...prices);
    const maxP = Math.max(...prices);
    const range = maxP - minP || 1;
    pts = points.map((p, i) => {
      const x = (i / (points.length - 1)) * w;
      const y = h - 4 - ((p[1] - minP) / range) * (h - 8);
      return [x.toFixed(1), Math.max(2, Math.min(h - 2, y)).toFixed(1)];
    });
  }

  let vwapY = null;
  if (!useFallback && vwap != null) {
    const prices = points.map(p => p[1]);
    const minP = Math.min(...prices);
    const maxP = Math.max(...prices);
    const range = maxP - minP || 1;
    vwapY = Math.max(2, Math.min(h - 2, h - 4 - ((vwap - minP) / range) * (h - 8)));
  }

  const d = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0]},${p[1]}`).join(' ');
  const [lx, ly] = pts[pts.length - 1];
  return (
    <svg width={w} height={h} style={{ display: 'block', flexShrink: 0 }}>
      {fill && <path d={`${d} L${w},${h} L0,${h}Z`} fill={color} fillOpacity={0.07} />}
      {vwapY != null && (
        <line x1={0} y1={vwapY} x2={w} y2={vwapY}
          stroke={T.ink3} strokeWidth={1} strokeDasharray="3 4" />
      )}
      <path d={d} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={lx} cy={ly} r={3} fill={color} />
      <circle cx={lx} cy={ly} r={7} fill="none" stroke={color} strokeOpacity={0.3} strokeWidth={1} />
    </svg>
  );
}

// ─── Bias bar ─────────────────────────────────────────────────
function BiasBar({ left, center, right, total }) {
  const T = useT();
  const tot = left + center + right || 1;
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: T.mono, fontSize: 10, color: T.ink3, marginBottom: 4 }}>
        <span>{total} sources</span><span>L {left} · C {center} · R {right}</span>
      </div>
      <div style={{ display: 'flex', height: 4, background: T.rule3 }}>
        <div style={{ width: `${(left / tot) * 100}%`, background: T.ink }} />
        <div style={{ width: `${(center / tot) * 100}%`, background: T.ink3 }} />
        <div style={{ width: `${(right / tot) * 100}%`, background: T.ink }} />
      </div>
    </div>
  );
}

// Animation speed per icon — >1 = slower, <1 = faster, 1 = Meteocons default
const ANIM_SPEED = {

  'partly-cloudy-night': 2.5,   // gentle cloud drift + moon

let _svgUid = 0;

function _processSvg(raw, uid, speedMult, sz) {
  const pfx = `wi${uid}`;
  const ids = [];
  raw.replace(/\bid="([^"]+)"/g, (_, id) => ids.push(id));
  let out = raw;
  // Namespace every id and its references so duplicate icons don't clash in the DOM
  ids.forEach(id => {
    const e   = id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const nid = `${pfx}-${id}`;
    out = out
      .replace(new RegExp(`id="${e}"`, 'g'),           `id="${nid}"`)
      .replace(new RegExp(`url\\(#${e}\\)`, 'g'),      `url(#${nid})`)
      .replace(new RegExp(`href="#${e}"`, 'g'),         `href="#${nid}"`)
      .replace(new RegExp(`xlink:href="#${e}"`, 'g'),  `xlink:href="#${nid}"`);
  });
  // Scale all SMIL animation durations
  out = out
    .replace(/\bdur="([\d.]+)s"/g,  (_, n) => `dur="${(parseFloat(n) * speedMult).toFixed(3)}s"`)
    .replace(/\bdur="([\d.]+)ms"/g, (_, n) => `dur="${Math.round(parseFloat(n) * speedMult)}ms"`);
  out = out.replace(/<svg /, `<svg width="${sz}" height="${sz}" `);
  return out;
}

function WxGlyph({ kind, size, speed: speedProp }) {
  const T      = useT();
  const isDark = T.paper === DARK.paper;
  const color  = isDark ? 'rgba(255,255,255,0.88)' : 'rgba(0,0,0,0.80)';
  const uid    = React.useRef(null);
  if (uid.current === null) uid.current = ++_svgUid;
  const raw = METEOCONS_SVG[kind] || METEOCONS_SVG['overcast'];
  const speed = speedProp ?? ANIM_SPEED[kind] ?? 2.5;
  const svg = React.useMemo(() => _processSvg(raw, uid.current, speed, size), [raw, size, speed]);
  return (
    <div style={{ width:size, height:size, color, display:'block', flexShrink:0 }}
      dangerouslySetInnerHTML={{ __html: svg }} />
  );
}

// Live clock
function useClock(timeFormat) {
  const [now, setNow] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setNow(new Date()), INTERVALS.CLOCK);
    return () => clearInterval(id);
  }, []);
  const pad = n => String(n).padStart(2, '0');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const h = now.getHours(), m = now.getMinutes();
  const amPm  = timeFormat === '12h' ? (h < 12 ? 'AM' : 'PM') : '';
  const dispH = timeFormat === '12h' ? String(h % 12 || 12) : pad(h);
  return {
    timeHM:   `${dispH}:${pad(m)}`,
    timeSec:  `:${pad(now.getSeconds())}`,
    amPm,
    dayStr:   `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`,
    dateShort: now.toISOString().slice(0, 10),
  };
}

// BTC price from Kraken (primary) + chart from CoinGecko (silent-fail)
function useBTC() {
  const [data, setData] = React.useState(null);
  const [cap, setCap] = React.useState(null);
  const [chartPts, setChartPts] = React.useState(null);
  const [err, setErr] = React.useState(false);
  const [lastOk, setLastOk] = React.useState(null);

  const fetch24hChart = async () => {
    try {
      const r = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1&interval=hourly');
      if (!r.ok) throw new Error('chart');
      const j = await r.json();
      setChartPts(j.prices || null);
      // market_caps is also returned; grab the latest value for display
      if (j.market_caps && j.market_caps.length) {
        setCap(j.market_caps[j.market_caps.length - 1][1]);
      }
    } catch {}
  };

  const fetchPrice = async () => {
    try {
      const r = await fetch('https://api.kraken.com/0/public/Ticker?pair=XBTUSD');
      if (!r.ok) throw new Error('price');
      const j = await r.json();
      if (j.error && j.error.length) throw new Error(j.error[0]);
      const t = j.result.XXBTZUSD;
      const price  = parseFloat(t.c[0]);
      const open   = parseFloat(t.o);
      const chgAbs = price - open;
      const chgPct = ((price - open) / open) * 100;
      const hi     = parseFloat(t.h[1]);
      const lo     = parseFloat(t.l[1]);
      const vwap   = parseFloat(t.p[1]);
      const vol    = parseFloat(t.v[1]);
      setData({ price, chgPct, chgAbs, hi, lo, vwap, vol });
      setErr(false);
      setLastOk(Date.now());
    } catch {
      setErr(true);
    }
  };

  React.useEffect(() => {
    fetchPrice();
    fetch24hChart();
    const id1 = setInterval(fetchPrice, INTERVALS.BTC);
    const id2 = setInterval(fetch24hChart, INTERVALS.BTC * 2);
    return () => { clearInterval(id1); clearInterval(id2); };
  }, []);

  const mergedData = data ? { ...data, cap } : null;
  return { data: mergedData, chartPts, err, lastOk };
}

// Chain vitals from mempool.space
function useChain() {
  const [data, setData] = React.useState(null);
  const [err, setErr] = React.useState(false);
  const [lastOk, setLastOk] = React.useState(null);

  const fetchChain = async () => {
    try {
      const [blockRes, hashrateRes, feesRes, mempoolRes, diffRes] = await Promise.all([
        fetch('https://mempool.space/api/blocks/tip/height'),
        fetch('https://mempool.space/api/v1/mining/hashrate/3d'),
        fetch('https://mempool.space/api/v1/fees/recommended'),
        fetch('https://mempool.space/api/mempool'),
        fetch('https://mempool.space/api/v1/difficulty-adjustment'),
      ]);

      const height = await blockRes.json();
      const hashrateData = await hashrateRes.json();
      const fees = await feesRes.json();
      const mempool = await mempoolRes.json();
      const diff = await diffRes.json();

      // hashrate: currentHashrate in H/s from the 3d endpoint
      const currentHashrate = hashrateData.currentHashrate || 0;
      const currentDiff = diff.difficultyChange !== undefined
        ? diff.difficulty || hashrateData.currentDifficulty
        : hashrateData.currentDifficulty;

      setData({
        height,
        hashrate: currentHashrate,
        difficulty: currentDiff || hashrateData.currentDifficulty,
        mempoolBytes: mempool.vsize,
        mempoolTx: mempool.count,
        feeFast: fees.fastestFee,
        feeEco: fees.economyFee,
        nextHalvingDate: nextHalving(height),
        circulating: circulatingBTC(height),
        diffAdj:          diff.difficultyChange,
        blockTimeMs:      diff.timeAvg,
        remainingBlocks:  diff.remainingBlocks,
        epochProgress:    diff.progressPercent,
        retargetDate:     diff.estimatedRetargetDate,
      });
      setErr(false);
      setLastOk(Date.now());
    } catch (e) {
      setErr(true);
    }
  };

  React.useEffect(() => {
    fetchChain();
    const id = setInterval(fetchChain, INTERVALS.CHAIN);
    return () => clearInterval(id);
  }, []);

  return { data, err, lastOk };
}

// BitAxe fleet stats — polls via API proxy or directly per-IP
function useBitaxe(apiUrl, ips) {
  const [miners, setMiners] = React.useState([]);
  const [err, setErr] = React.useState(false);
  const [loading, setLoading] = React.useState(true);
  const [lastOk, setLastOk] = React.useState(null);

  const fetchBitaxe = async () => {
    let next;
    if (apiUrl) {
      try {
        const r = await fetch(apiUrl, { signal: AbortSignal.timeout(5000) });
        if (!r.ok) throw new Error('api');
        const body = await r.json();
        next = body.miners;
      } catch {
        next = ips.map(ip => ({ ip, online: false }));
      }
    } else {
      const results = await Promise.allSettled(
        ips.map(async ip => {
          const r = await fetch(`http://${ip}/api/system/info`, { signal: AbortSignal.timeout(5000) });
          if (!r.ok) throw new Error('bitaxe');
          const data = await r.json();
          return { ip, online: true, data };
        })
      );
      next = results.map((r, i) =>
        r.status === 'fulfilled' ? r.value : { ip: ips[i], online: false }
      );
    }
    setMiners(next);
    setErr(next.every(m => !m.online));
    setLoading(false);
    setLastOk(Date.now());
  };

  React.useEffect(() => {
    fetchBitaxe();
    const id = setInterval(fetchBitaxe, INTERVALS.BITAXE);
    return () => clearInterval(id);
  }, [apiUrl, ips.join(',')]);

  return { miners, err, loading, lastOk };
}

// Hour formatter for 12h/24h time formats
function fmtHour(hr, timeFormat) {
  if (timeFormat === '24h') return `${String(hr).padStart(2, '0')}:00`;
  if (hr === 0)  return '12am';
  if (hr < 12)   return `${hr}am`;
  if (hr === 12) return '12pm';
  return `${hr - 12}pm`;
}

// Weather from Open-Meteo
function useWeather(lat, lng, tempUnit) {
  const [data, setData] = React.useState(null);
  const [err, setErr] = React.useState(false);
  const [lastOk, setLastOk] = React.useState(null);

  const fetchWeather = async () => {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m&hourly=temperature_2m,weather_code,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset&temperature_unit=${tempUnit}&wind_speed_unit=mph&forecast_days=1&timezone=auto`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('weather');
      const j = await r.json();

      const cur = j.current;
      const windDirs = ['N','NE','E','SE','S','SW','W','NW'];
      const windDir = windDirs[Math.round(cur.wind_direction_10m / 45) % 8];
      const now = new Date();
      const curHour = now.getHours();

      // Build 8 hourly slots starting from current hour
      const hourly = [];
      for (let i = 0; i < 8; i++) {
        const idx = j.hourly.time.findIndex(t => {
          const h = new Date(t).getHours();
          return h === (curHour + i) % 24;
        });
        if (idx >= 0) {
          const t = new Date(j.hourly.time[idx]);
          const hr = t.getHours();
          hourly.push({
            hr,
            t:   Math.round(j.hourly.temperature_2m[idx]),
            code: j.hourly.weather_code[idx],
            pop:  j.hourly.precipitation_probability[idx] ?? 0,
          });
        }
      }

      setData({
        temp:   Math.round(cur.temperature_2m),
        feels:  Math.round(cur.apparent_temperature),
        wxCond: wmoDesc(cur.weather_code),
        wxCode: cur.weather_code,
        wxWindSpeed: Math.round(cur.wind_speed_10m),
        wxWind: `${windDir} ${Math.round(cur.wind_speed_10m)} mph`,
        wxHum:  `${cur.relative_humidity_2m}%`,
        wxHi:         Math.round(j.daily.temperature_2m_max[0]),
        wxLo:         Math.round(j.daily.temperature_2m_min[0]),
        wxSunriseHr:  parseInt(j.daily.sunrise[0].split('T')[1]),
        wxSunsetHr:   parseInt(j.daily.sunset[0].split('T')[1]),
        hourly: hourly.slice(0, 8),
      });
      setErr(false);
      setLastOk(Date.now());
    } catch {
      setErr(true);
    }
  };

  React.useEffect(() => {
    fetchWeather();
    const id = setInterval(fetchWeather, INTERVALS.WEATHER);
    return () => clearInterval(id);
  }, [lat, lng, tempUnit]);

  return { data, err, lastOk };
}

// RSS headlines via rss2json
function useRSS() {
  const [items, setItems] = React.useState([]);
  const [err, setErr] = React.useState(false);
  const [leadStory, setLeadStory] = React.useState(null);
  const [lastOk, setLastOk] = React.useState(null);

  const fetchRSS = async () => {
    const key = CONFIG.RSS2JSON_KEY ? `&api_key=${CONFIG.RSS2JSON_KEY}` : '';
    const feeds = CONFIG.RSS_FEEDS || [];

    const results = await Promise.allSettled(feeds.map(async feedUrl => {
      const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}${key}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('rss');
      const j = await r.json();
      if (j.status !== 'ok') throw new Error('rss-status');
      const src = j.feed.title || new URL(feedUrl).hostname;
      return j.items.map(it => ({
        cat: (it.categories && it.categories[0]) ? it.categories[0].toUpperCase().slice(0, 10) : 'BITCOIN',
        hed: it.title,
        src,
        pubDate: it.pubDate,
        t: timeAgo(it.pubDate),
        link: it.link,
        img: it.thumbnail || (it.enclosure && it.enclosure.type && it.enclosure.type.startsWith('image/') ? it.enclosure.link : null) || null,
        snippet: it.description
          ? it.description.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim().slice(0, 1000)
          : '',
      }));
    }));

    const all = results
      .filter(r => r.status === 'fulfilled')
      .flatMap(r => r.value)
      .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    if (all.length > 0) {
      setLeadStory(all[0]);
      setItems(all.slice(1, 15));
      setErr(false);
      setLastOk(Date.now());
    } else {
      setErr(true);
    }
  };

  React.useEffect(() => {
    fetchRSS();
    const id = setInterval(fetchRSS, INTERVALS.RSS);
    return () => clearInterval(id);
  }, []);

  // Refresh relative times every minute
  React.useEffect(() => {
    const id = setInterval(() => {
      setItems(prev => prev.map(it => ({ ...it, t: timeAgo(it.pubDate) })));
    }, 60000);
    return () => clearInterval(id);
  }, []);

  return { items, leadStory, err, lastOk };
}

// Feed health: 'loading' | 'live' | 'degraded' | 'offline'
function useFeedHealth(feeds) {
  const [status, setStatus] = React.useState('loading');
  const ref = React.useRef(feeds);
  ref.current = feeds;
  React.useEffect(() => {
    const check = () => {
      const now = Date.now();
      const stale = ref.current.filter(f => !f.lastOk || now - f.lastOk > f.interval * 2).length;
      if (stale === 0) setStatus('live');
      else if (stale < ref.current.length) setStatus('degraded');
      else setStatus('offline');
    };
    check();
    const id = setInterval(check, 5000);
    return () => clearInterval(id);
  }, []);
  return status;
}

function CommandCenter({ dark, onToggleDark, bitaxeApiUrl, bitaxeIps, prefs, settingsOpen, onOpenSettings, onSaveSettings, onCloseSettings }) {
  const T = useT();
  const clock   = useClock(prefs.timeFormat);

  const weather = useWeather(prefs.lat, prefs.lng, prefs.tempUnit);
  const rss     = useRSS();

  // Auto dark mode — fires once when sunrise/sunset first loads; respects manual toggle after
  const autoThemeDone = React.useRef(false);
  React.useEffect(() => {
    if (autoThemeDone.current) return;
    const wx = weather.data;
    if (!wx?.wxSunriseHr && wx?.wxSunriseHr !== 0) return;
    const hr = new Date().getHours();
    const shouldBeDark = hr < wx.wxSunriseHr || hr >= wx.wxSunsetHr;
    if (shouldBeDark !== dark) onToggleDark();
    autoThemeDone.current = true;
  }, [weather.data?.wxSunriseHr]);
  const feedHealth = useFeedHealth([
    { lastOk: btc.lastOk,     interval: INTERVALS.BTC },
    { lastOk: chain.lastOk,   interval: INTERVALS.CHAIN },
    { lastOk: bitaxe.lastOk,  interval: INTERVALS.BITAXE },
    { lastOk: weather.lastOk, interval: INTERVALS.WEATHER },
    { lastOk: rss.lastOk,     interval: INTERVALS.RSS },
  ]);

  // Derived values
  const btcPrice   = btc.data ? `$${fmtPrice(btc.data.price)}` : '—';
  const btcChgPct  = btc.data ? fmtPct(btc.data.chgPct) : '—';

  const btcHi      = btc.data ? fmtPrice(btc.data.hi) : '—';

    { k: 'Size',           v: mempoolMB,  c: mempoolCol },
    { k: 'Tx count',       v: mempoolTx,  c: mempoolTxCol },
    { k: 'Blocks to clear',v: blocksToClr != null ? `${blocksToClr} blk` : '—', c: blocksToClrCol },
    { k: 'Fee · fast',     v: feeFast,    c: feeFastCol },
    { k: 'Fee · eco',      v: feeEco,     c: feeEcoCol },
  ];

  // System status
  const sys = [
    { k: 'miners', v: bitaxe.err ? 'err' : (onlineCount > 0 ? 'ok' : (bitaxe.loading ? '…' : 'err')), d: bitaxe.loading ? 'connecting' : `${onlineCount}/${minerCount} online` },
    { k: 'mempool', v: chain.err ? 'err' : (chain.data ? 'ok' : '…'), d: chain.data ? `${mempoolMB}` : '—' },
    { k: 'kraken', v: btc.err ? 'err' : (btc.data ? 'ok' : '…'), d: btc.data ? `${btcChgPct}% 24h` : '—' },
    { k: 'weather', v: weather.err ? 'err' : (weather.data ? 'ok' : '…'), d: weather.data ? weather.data.wxCond.toLowerCase() : '—' },
    { k: 'rss', v: rss.err ? 'err' : (rss.items.length > 0 ? 'ok' : '…'), d: rss.items.length > 0 ? `${rss.items.length} stories` : '—' },
  ];

  const wx = weather.data;
  const lead = rss.leadStory;
  const newsItems = rss.items;

  // Top-bar summary
  const tempUnitLabel = prefs.tempUnit === 'celsius' ? '°C' : '°F';
  const wxSummary = wx ? `${wx.temp}${tempUnitLabel} ${wx.wxCond.toLowerCase()}` : `—${tempUnitLabel}`;

  return (
    <div style={{
      position: 'relative',
      width: 1920, height: 1080,
      background: T.paper, color: T.ink,
      fontFamily: T.body,
      display: 'flex', flexDirection: 'column',
      padding: '28px 56px 32px',
    }}>
      {/* TOP CHROME */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr auto', alignItems:'center', paddingBottom: 8, fontFamily: T.sans, fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', color: T.ink3, width:'100%' }}>
        <span style={{ whiteSpace:'nowrap' }}>{clock.dayStr}</span>
        <span style={{ whiteSpace:'nowrap', textAlign:'center' }}>Home Edition · Vol. I, Nº 238</span>
        <span style={{ whiteSpace:'nowrap', textAlign:'right' }}>{clock.timeHM}{clock.timeSec}{clock.amPm ? ` ${clock.amPm}` : ''} · {wxSummary}</span>
        <div style={{ display:'flex', gap:16, marginLeft:20 }}>
          <button onClick={onOpenSettings} style={{ fontFamily:T.sans, fontSize:10, fontWeight:700, letterSpacing:1.5, textTransform:'uppercase', padding:'4px 12px', cursor:'pointer', border:'none', background:T.paper2, color:T.ink }}>⚙ Masthead</button>
          <button onClick={onToggleDark} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:T.sans, fontSize:10, fontWeight:600, letterSpacing:1.8, textTransform:'uppercase', color:T.ink3, padding:0 }}>
            {dark ? '◑ Light' : '◐ Dark'}
          </button>
        </div>
      </div>
      <Rule double />

      {/* TICKER */}
      <div style={{ display:'flex', alignItems:'center', gap:28, padding:'9px 0', borderBottom:`1px solid ${T.rule2}`, fontFamily:T.mono, fontSize:12, overflowX:'hidden', whiteSpace:'nowrap' }}>
        <span style={{ fontFamily:T.sans, fontWeight:700, fontSize:9, letterSpacing:2, color:T.ink3, display:'flex', alignItems:'center', gap:4 }}>
          LIVE
          <span style={{
            color: feedHealth === 'live' ? '#d63030' : feedHealth === 'degraded' ? T.orange : T.ink4,
            animation: feedHealth === 'live' ? 'live-pulse 1.4s ease-in-out infinite' : 'none',
            display: 'inline-block',
            lineHeight: 1,
          }}>⏺</span>
        </span>
        {[
          ['BTC',     btcPrice,                   `${btcUp ? '▲' : '▼'} ${btcChgPct}%`,   btcUp ? T.orange : T.ink2],
          ['BLOCK',   blockHeight,                 'latest',                                T.ink3],
          ['HASH',    chain.data ? fmtHashrate(chain.data.hashrate) : '—', chain.data && chain.data.diffAdj != null ? `${chain.data.diffAdj >= 0 ? '+' : ''}${chain.data.diffAdj?.toFixed(1)}%` : '', T.ink3],
          ['FEE',     chain.data ? `${chain.data.feeFast} sat/vB` : '—', chain.data ? `≈$${((chain.data.feeFast * 140 * btc.data?.price / 1e8) || 0).toFixed(2)}` : '', T.ink3],
          ['MEMPOOL', mempoolMB,                   `${mempoolTx} tx`,                       T.ink3],
          ['FLEET',   onlineCount > 0 ? `${totalHashrateTHS.toFixed(2)} TH/s` : (bitaxe.err ? 'offline' : '…'), onlineCount > 0 ? `${combinedEff} J/TH` : '', T.ink3],
          ['SOLO',    `1:${soloOdds ? fmtNum(soloOdds.oddsPerDay) : '—'}/d`, etaStr,    T.ink3],
        ].map(([k,v,s,sc],i)=>(
          <span key={i}>
            <span style={{ color:T.ink3, letterSpacing:1 }}>{k}</span>{' '}
            <b style={{ fontWeight:600, color:T.ink }}>{v}</b>{' '}
            <span style={{ color:sc }}>{s}</span>
          </span>
        ))}
      </div>

      {/* BODY — 4-column grid */}
      <div style={{ display:'grid', gridTemplateColumns:'300px 1.1fr 1fr 1fr', gap:28, paddingTop:22, flex:1, minHeight:0 }}>

        {/* COL 0 — WORDMARK RAIL */}
        <div style={{ borderRight:`1px solid ${T.rule2}`, paddingRight:22, display:'flex', flexDirection:'column', gap:18, overflow:'hidden' }}>
          <div>
            <div style={{ fontFamily:T.serif, fontSize:70, fontWeight:700, lineHeight:0.86, letterSpacing:-2.5, color:T.ink }}>
              The<br/>Daily<br/>Node
            </div>
            <div style={{ fontFamily:T.body, fontStyle:'italic', fontSize:13, color:T.ink2, marginTop:13, borderTop:`1px solid ${T.rule2}`, paddingTop:9, lineHeight:1.4 }}>
              "All signal, no noise —<br/>before your coffee cools."
            </div>
          </div>
          <Rule />
          {/* Clock */}
          <div>
            <Kicker>Today</Kicker>
            <div style={{ marginTop:6 }}>
              <div style={{ display:'flex', alignItems:'baseline', gap:6 }}>
                <Num size="lg" value={clock.timeHM} unit={clock.timeSec} style={{ alignItems:'baseline' }} />
                {clock.amPm && <span style={{ fontFamily:T.mono, fontSize:16, color:T.ink2, lineHeight:1 }}>{clock.amPm}</span>}
              </div>
            </div>
            <div style={{ fontFamily:T.body, fontStyle:'italic', fontSize:13, color:T.ink2, marginTop:4 }}>{clock.dayStr}</div>
          </div>
          <Rule dash />
          {/* Weather */}
          <div>
            <Kicker>Weather</Kicker>
            {wx ? (
              <>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginTop:8 }}>
                  <WxGlyph kind={wmoIcon(wx.wxCode, new Date().getHours(), wx.wxWindSpeed, wx.wxSunriseHr, wx.wxSunsetHr)} size={48} speed={wmoSpeed(wx.wxCode, wx.wxWindSpeed)} />
                  <div>
                    <Num size="lg" value={`${wx.temp}°`} unit={prefs.tempUnit === 'celsius' ? 'C' : 'F'} />
                    <div style={{ fontFamily:T.body, fontStyle:'italic', fontSize:12, color:T.ink2, marginTop:3 }}>
                      {wx.wxCond} · feels {wx.feels}° · H{wx.wxHi} L{wx.wxLo}
                    </div>
                  </div>
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(8,1fr)', gap:4, marginTop:12, paddingTop:10, borderTop:`1px solid ${T.rule3}` }}>
                  {wx.hourly.map((h,i)=>(
                    <div key={i} style={{ textAlign:'center' }}>
                      <div style={{ fontFamily:T.mono, fontSize:10, color:T.ink3 }}>{fmtHour(h.hr, prefs.timeFormat)}</div>
                      <div style={{ margin:'3px auto' }}><WxGlyph kind={wmoIcon(h.code, h.hr, null, wx.wxSunriseHr, wx.wxSunsetHr)} size={24} speed={wmoSpeed(h.code)} /></div>
                      <Num size="xs" value={`${h.t}°`} />
                      {h.pop >= 30 && <div style={{ fontFamily:T.mono, fontSize:9, color:T.ink3, marginTop:1 }}>{h.pop}%</div>}
                    </div>
                  ))}
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', marginTop:10, fontFamily:T.mono, fontSize:10, color:T.ink3 }}>
                  <span>wind {wx.wxWind}</span><span>hum {wx.wxHum}</span>
                </div>
              </>
            ) : (
              <div style={{ fontFamily:T.mono, fontSize:12, color:T.ink3, marginTop:8 }}>
                {weather.err ? 'weather unavailable' : 'loading…'}
              </div>
            )}
          </div>
          <Rule dash />
          {/* System */}
          <div>
            <Kicker>System</Kicker>
            <div style={{ display:'grid', gridTemplateColumns:'1fr auto auto', rowGap:5, columnGap:12, marginTop:8 }}>
              {sys.map((s,i)=>(
                <React.Fragment key={i}>
                  <span style={{ fontFamily:T.mono, fontSize:12, color:T.ink2 }}>
                    <StatusDot ok={s.v === 'ok'} />{s.k}
                  </span>
                  <Num size="xs" value={s.v} style={{ justifyContent:'flex-end' }} />
                  <span style={{ fontFamily:T.mono, fontSize:10, color:T.ink3, textAlign:'right' }}>{s.d}</span>
                </React.Fragment>
              ))}
            </div>
          </div>
          <div style={{ flex:1 }} />
          <div style={{ fontFamily:T.body, fontStyle:'italic', fontSize:10, color:T.ink3, borderTop:`1px solid ${T.rule2}`, paddingTop:8 }}>
            Published from a home on the internet. Set in Fraunces &amp; Newsreader.
          </div>
        </div>

        {/* COL 1 — MARKETS + LEAD STORY */}
        <div style={{ borderRight:`1px solid ${T.rule2}`, paddingRight:24, display:'flex', flexDirection:'column', gap:13, overflow:'hidden' }}>
          {/* BTC market */}
          <Kicker>Markets · BTC / USD</Kicker>
          {/* Row 1: price left, % change right */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
            <Num size="hero" value={btcPrice} />
            <div style={{ fontFamily:T.mono, fontSize:22, fontWeight:600, color:btcUp ? T.green : T.red, paddingBottom:10 }}>
              {btcUp ? '▲' : '▼'} {btcChgPct}%
            </div>
          </div>
          {/* Row 2: hi · lo · cap bar */}
          <div style={{ display:'flex', justifyContent:'space-between', fontFamily:T.mono, fontSize:11, borderTop:`1px solid ${T.rule2}`, borderBottom:`1px solid ${T.rule2}`, padding:'5px 0', marginBottom:6 }}>
            <span style={{ color:T.green }}>hi ${btcHi}</span>
            <span style={{ color:T.ink3 }}>·</span>
            <span style={{ color:T.red }}>lo ${btcLo}</span>
            <span style={{ color:T.ink3 }}>·</span>
            <span style={{ color:btcUp ? T.green : T.red }}>cap {btcCap}</span>
            <span style={{ color:T.ink3 }}>·</span>
            <span style={{ color:T.ink3 }}>vol {btcVol}</span>
            <span style={{ color:T.ink3 }}>·</span>
            <span style={{ color:T.orange }}>{btc.data ? fmtNum(Math.round(1e8 / btc.data.price)) : '—'} sat/$</span>
          </div>
          <LineChart w={470} h={110} color={T.orange} points={btc.chartPts} vwap={btc.data?.vwap} fill />
          <div style={{ display:'flex', justifyContent:'space-between', fontFamily:T.mono, fontSize:10, color:T.ink3 }}>
            <span>24h ago</span><span>−18h</span><span>−12h</span><span>−6h</span><span>now</span>
          </div>
          <Rule dash />
          {/* Lead story */}
          {lead ? (
            <div style={{ flex:1, display:'flex', flexDirection:'column', gap:8, overflow:'hidden', minHeight:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
                <Kicker color={T.orange}>● {lead.cat} · {lead.src}</Kicker>
                <Kicker>{lead.t}</Kicker>
              </div>
              <a href={lead.link} target="_blank" rel="noopener noreferrer">
                <h1 style={{ fontFamily:T.serif, fontSize:32, fontWeight:700, lineHeight:1.04, letterSpacing:-1, color:T.ink, textWrap:'balance', margin:0 }}>
                  {lead.hed}
                </h1>
              </a>
              {lead.img ? (
                <img
                  src={lead.img}
                  alt=""
                  style={{ width:'100%', height:'auto', borderRadius:3, display:'block' }}
                  onError={e => { e.currentTarget.style.display = 'none'; }}
                />
              ) : null}
              {lead.snippet ? (
                <div className="no-scrollbar" style={{ flex:1, overflowY:'auto', minHeight:0, fontFamily:T.body, fontSize:13.5, lineHeight:1.5, color:T.ink2 }}>
                  <span style={{ fontFamily:T.serif, fontSize:44, fontWeight:700, color:T.ink, float:'left', lineHeight:0.88, marginRight:8, marginTop:3 }}>
                    {lead.snippet.charAt(0)}
                  </span>
                  {lead.snippet.slice(1)}
                </div>
              ) : null}
            </div>
          ) : (
            <>
              <Kicker color={T.orange}>● {rss.err ? 'RSS unavailable' : 'Loading feed…'}</Kicker>
              <h1 style={{ fontFamily:T.serif, fontSize:32, fontWeight:700, lineHeight:1.04, letterSpacing:-1, color:T.ink4, margin:0 }}>
                {rss.err ? 'All feeds unavailable' : 'Fetching headlines…'}
              </h1>
            </>
          )}
        </div>

        {/* COL 2 — HEADLINES FEED */}
        <div style={{ borderRight:`1px solid ${T.rule2}`, paddingRight:24, overflow:'hidden', display:'flex', flexDirection:'column', minHeight:0 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
            <Kicker>Bitcoin news</Kicker>
            {rss.err && <Kicker color={T.red}>feed error</Kicker>}
          </div>
          <div className={`news-col-wrap${newsItems.length < 8 ? ' at-bottom' : ''}`} style={{ marginTop:8, flex:1, minHeight:0 }}>
            <div className="news-scroll" style={{ height:'100%', overflowY:'auto' }}
              onScroll={e => {
                const el = e.currentTarget;
                const wrap = el.parentElement;
                el.classList.add('is-scrolling');
                clearTimeout(wrap._st);
                wrap._st = setTimeout(() => el.classList.remove('is-scrolling'), 1200);
                wrap.classList.toggle('at-bottom', el.scrollHeight - el.scrollTop - el.clientHeight < 4);
              }}>
              {newsItems.length > 0 ? newsItems.map((it,i)=>(
                <a key={i} href={it.link} target="_blank" rel="noopener noreferrer" style={{ display:'block', padding:'9px 0', borderBottom:`1px solid ${T.rule3}` }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                    <Kicker color={it.cat === 'BREAKING' ? T.red : T.ink3}>{it.cat}</Kicker>
                    <span style={{ fontFamily:T.mono, fontSize:10, color:T.ink3 }}>{it.t}</span>
                  </div>
                  <div style={{ fontFamily:T.body, fontSize:14.5, lineHeight:1.3, color:T.ink, letterSpacing:-0.1 }}>{it.hed}</div>
                  <div style={{ fontFamily:T.body, fontStyle:'italic', fontSize:11, color:T.ink3, marginTop:2 }}>{it.src}</div>
                </a>
              )) : (
                <div style={{ fontFamily:T.mono, fontSize:12, color:T.ink3, marginTop:16 }}>
                  {rss.err ? 'All feeds unavailable' : 'Loading headlines…'}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* COL 3 — HOME FLEET + CHAIN VITALS */}
        <div style={{ display:'flex', flexDirection:'column', gap:10, overflow:'hidden' }}>
          <Kicker>Home fleet · {onlineCount}/{minerCount} online</Kicker>
          <h2 style={{ fontFamily:T.serif, fontSize:20, fontWeight:700, lineHeight:1.05, letterSpacing:-0.4, color:T.ink, textWrap:'balance', margin:0 }}>
            A <span style={{ fontStyle:'italic' }}>one-in-{soloOdds ? fmtNum(soloOdds.oddsPerDay).toLowerCase() : 'unknown'}</span> chance, every day.
          </h2>
          <div style={{ fontFamily:T.body, fontStyle:'italic', fontSize:11, color:T.ink2 }}>
            {bxPool} · {onlineCount > 0 ? `${totalHashrateTHS.toFixed(2)} TH/s combined` : 'miners offline'}
          </div>
          {/* Solo odds hero */}
          <div style={{ paddingTop:2 }}>
            {onlineCount === 0 ? (
              <div style={{ fontFamily:T.mono, fontSize:18, color:T.ink3 }}>
                {bitaxe.loading ? 'Connecting to miners…' : 'All miners offline'}
              </div>
            ) : (
              <div style={{ fontFamily:T.mono, fontSize:64, fontWeight:500, letterSpacing:-1, lineHeight:1, color:T.ink, fontFeatureSettings:'"tnum"' }}>
                {oddsStr}
              </div>
            )}
            <div style={{ fontFamily:T.mono, fontSize:12, color:T.ink3, marginTop:4, letterSpacing:0.5 }}>
              per day · expected {etaStr}
            </div>
          </div>
          {/* Per-miner cards */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            {bitaxe.miners.length === 0 && !bitaxe.loading && (
              <div style={{ gridColumn:'1/-1', fontFamily:T.mono, fontSize:12, color:T.ink3 }}>
                No miners reachable
              </div>
            )}
            {bitaxe.miners.map((miner, i) => {
              const md = miner.online ? miner.data : null;
              const hrTHS  = md ? ((md.hashRate || 0) / 1000).toFixed(2) : '—';
              const temp   = md ? (md.temp || md.temperature || '—') : '—';
              const power  = md ? (md.power || '—') : '—';
              const eff    = md && md.power && md.hashRate ? (md.power / (md.hashRate / 1000)).toFixed(1) : '—';
              const model  = md ? (md.boardVersion || md.ASICModel || 'Bitaxe') : 'Bitaxe';
              return (
                <div key={i} style={{ borderLeft:`2px solid ${miner.online ? T.green : T.red}`, paddingLeft:8, paddingTop:4, paddingBottom:4 }}>
                  <div style={{ fontFamily:T.mono, fontSize:10, color:T.ink3, marginBottom:3 }}>
                    <StatusDot ok={miner.online} />{miner.ip}
                  </div>
                  <div style={{ fontFamily:T.mono, fontSize:10, color:T.ink2, marginBottom:6 }}>{model}</div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'4px 8px' }}>
                    {[
                      [hrTHS, 'TH/s', 'Hashrate'],
                      [temp,  '°C',   'Temp'],
                      [power, 'W',    'Power'],
                      [eff,   'J/TH', 'Eff'],
                    ].map(([v, u, label], j) => (
                      <div key={j} style={{ borderLeft:`1px solid ${T.rule3}`, paddingLeft:6 }}>
                        <Num size="xs" value={v} unit={u} />
                        <Kicker style={{ marginTop:2 }}>{label}</Kicker>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ fontFamily:T.body, fontStyle:'italic', fontSize:11, color:T.ink3 }}>
            "hash and pray." · {fmtNum(totalShOk)} ok / {fmtNum(totalShRej)} rej
          </div>
          <Rule dash />
          {/* Chain vitals */}
          <Kicker>Chain vitals</Kicker>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'0 14px' }}>
            {[['Mining', miningRows], ['Mempool', mempoolRows], ['Chain', chainStatRows]].map(([title, rows])=>(
              <div key={title}>
                <Kicker style={{ marginBottom:6 }}>{title}</Kicker>
                <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                  {rows.map((r,i)=>(
                    <div key={i} style={{ borderLeft:`1px solid ${T.rule3}`, paddingLeft:8 }}>
                      <Num size="sm" value={r.v} style={{ color: r.c || T.ink }} />
                      <Kicker style={{ marginTop:2 }}>{r.k}</Kicker>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>

      </div>
      {settingsOpen && <MastheadPanel apiUrl={bitaxeApiUrl} ips={bitaxeIps} prefs={prefs} onSave={onSaveSettings} onClose={onCloseSettings} />}
    </div>
  );
}

function App() {
  const [dark, setDark] = React.useState(false);
  const [settingsOpen, setSettingsOpen] = React.useState(false);

  const loadSaved = () => { try { return JSON.parse(localStorage.getItem('dailynode-bitaxe') || '{}'); } catch { return {}; } };
  const loadPrefs = () => { try { return JSON.parse(localStorage.getItem('dailynode-prefs') || '{}'); } catch { return {}; } };
  const [bitaxeApiUrl, setBitaxeApiUrl] = React.useState(() => { const s = loadSaved(); return s.apiUrl !== undefined ? s.apiUrl : CONFIG.BITAXE_API_URL; });
  const [bitaxeIps, setBitaxeIps]       = React.useState(() => { const s = loadSaved(); return s.ips   !== undefined ? s.ips   : CONFIG.BITAXE_IPS; });
  const [prefs, setPrefs] = React.useState(() => {
    const s = loadPrefs();
    return {
      lat:        s.lat        ?? CONFIG.WEATHER_LAT,
      lng:        s.lng        ?? CONFIG.WEATHER_LNG,
      cityName:   s.cityName   ?? '',
      timeFormat: s.timeFormat ?? '12h',
      tempUnit:   s.tempUnit   ?? 'fahrenheit',
    };
  });

  const theme = dark ? DARK : LIGHT;

  React.useEffect(() => { window.applyScale && window.applyScale(); }, []);
  React.useEffect(() => {
    document.documentElement.style.setProperty('--paper', dark ? DARK.paper : LIGHT.paper);
  }, []);

  const toggleDark = () => {
    setDark(prev => {
      const next = !prev;
      document.body.style.background = next ? DARK.paper : LIGHT.paper;
      document.documentElement.style.setProperty('--paper', next ? DARK.paper : LIGHT.paper);
      return next;
    });
  };

  const saveSettings = (url, ips, newPrefs) => {
    setBitaxeApiUrl(url);
    setBitaxeIps(ips);
    localStorage.setItem('dailynode-bitaxe', JSON.stringify({ apiUrl: url, ips }));
    setPrefs(newPrefs);
    localStorage.setItem('dailynode-prefs', JSON.stringify(newPrefs));
    setSettingsOpen(false);
  };

  return (
    <ThemeCtx.Provider value={theme}>
      <CommandCenter
        dark={dark} onToggleDark={toggleDark}
        bitaxeApiUrl={bitaxeApiUrl} bitaxeIps={bitaxeIps}
        prefs={prefs}
        settingsOpen={settingsOpen}
        onOpenSettings={() => setSettingsOpen(true)}
        onSaveSettings={saveSettings}
        onCloseSettings={() => setSettingsOpen(false)}
      />
    </ThemeCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('canvas')).render(<App />);
</script>
</body>
</html>
