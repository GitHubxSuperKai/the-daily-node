  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;

    width: calc(var(--u) * 1920);

<script>
const CANVAS_W = 1920, CANVAS_H = 1080;
function updateScale() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const isMobile = vw < 900; // SYNC: must match MOBILE_BREAKPOINT in useLayoutSize.js and @media (max-width:900px)
  const s = isMobile ? 1 : Math.min(vw / CANVAS_W, vh / CANVAS_H);
  const r = document.documentElement;
  r.style.setProperty('--u', s + 'px');
  r.style.setProperty('--u-scale', s);
}
window.addEventListener('resize', updateScale);
window.addEventListener('load', updateScale);
updateScale();
window.updateScale = updateScale;
</script>

// ─── Formatting Utilities ───────────────────────────────────────
// Pure functions for number, price, time, weather, and Bitcoin formatting

function fmtNum(n, decimals = 0) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtPrice(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n >= 0 ? '+' : '';
  return `${sign}${Number(n).toFixed(2)}`;
}

function fmtVolUsd(v) {
  if (v == null || isNaN(v)) return '—';
  return v >= 1e9 ? `$${(v / 1e9).toFixed(1)}B` : `$${Math.round(v / 1e6)}M`;
}

function fmtBlockTime(ms) {
  const s = Math.round(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}m ${s % 60}s`;
}

function fmtHashrate(ehsRaw) {
  // mempool returns H/s
  const ehs = ehsRaw / 1e18;
  return ehs >= 1 ? `${ehs.toFixed(0)} EH/s` : `${(ehsRaw / 1e15).toFixed(1)} PH/s`;
}

function fmtDiff(d) {
  if (d >= 1e12) return `${(d / 1e12).toFixed(1)} T`;
  if (d >= 1e9)  return `${(d / 1e9).toFixed(1)} B`;
  return fmtNum(d);
}

function fmtMempoolMB(bytes) {
  return `${(bytes / 1e6).toFixed(0)} MB`;
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff <= 0)   return 'just now';
  if (diff < 60)   return `${Math.round(diff)}s ago`;
  if (diff < 3600) return `${Math.round(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.round(diff / 3600)}h ago`;
  return `${Math.round(diff / 86400)}d ago`;
}

function fmtHour(hr, timeFormat) {
  if (timeFormat === '24h') return `${String(hr).padStart(2, '0')}:00`;
  if (hr === 0)  return '12am';
  if (hr < 12)   return `${hr}am`;
  if (hr === 12) return '12pm';
  return `${hr - 12}pm`;
}

// Format a "HH:MM" string (e.g. "18:00") per timeFormat preference
function fmtHHMM(hhmm, timeFormat) {
  if (!hhmm) return '';
  const [h, m] = hhmm.split(':').map(Number);
  if (timeFormat === '24h') return hhmm;
  const suffix = h < 12 ? 'am' : 'pm';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(m).padStart(2, '0')}${suffix}`;
}

function nextHalving(height) {
  const halvingInterval = 210000;
  const nextHalvingBlock = Math.ceil((height + 1) / halvingInterval) * halvingInterval;
  const blocksRemaining = nextHalvingBlock - height;
  const daysRemaining = blocksRemaining / 144;
  const date = new Date(Date.now() + daysRemaining * 86400000);
  return date.toISOString().slice(0, 10);
}

function circulatingBTC(height) {
  let supply = 0, reward = 50, h = 0;
  while (h + 210000 <= height) { supply += 210000 * reward; reward /= 2; h += 210000; }
  supply += (height - h) * reward;
  return `${(supply / 1e6).toFixed(2)}M BTC`;
}

function calcSoloOdds(networkEHS, minerTHS) {
  if (!networkEHS || !minerTHS) return null;
  const networkTHS = networkEHS * 1e6; // EH/s → TH/s
  const sharePerDay = (minerTHS / networkTHS) * 144; // 144 blocks/day
  if (sharePerDay <= 0) return null;
  const oddsPerDay = Math.round(1 / sharePerDay);
  const etaYears = Math.round((1 / sharePerDay) / 365);
  return { oddsPerDay, etaYears };
}

// WMO weather code → Meteocons icon name (day/night aware, wind override)
function wmoIcon(code, hr, windMph, sunriseHr, sunsetHr) {
  const night = hr !== undefined && (
    sunriseHr != null && sunsetHr != null
      ? (hr < sunriseHr || hr >= sunsetHr)
      : (hr < 6 || hr >= 20)            // fallback before sunrise/sunset loads
  );
  if (windMph != null && windMph >= 25 && code <= 2) return 'wind';
  if (code <= 1)                                     return night ? 'clear-night'          : 'clear-day';
  if (code === 2)                                    return night ? 'partly-cloudy-night'  : 'partly-cloudy-day';
  if (code === 3)                                    return 'overcast';
  if (code === 45 || code === 48)                    return 'fog';
  if ((code >= 71 && code <= 77) || code === 85 || code === 86) return 'snow';
  if (code >= 95)                                    return 'thunderstorms';
  if (code >= 51 && code <= 55)                      return 'drizzle';
  if (code >= 51)                                    return 'rain';
  return night ? 'partly-cloudy-night' : 'partly-cloudy-day';
}

// Animation speed tied to condition intensity — higher = slower, lower = faster
function wmoSpeed(code, windMph) {
  if (windMph != null && windMph >= 25 && code <= 2) {
    // Wind icon: faster as mph climbs (25→1.0, 40→0.7, 60→0.45)
    return Math.max(0.4, 1.0 - (windMph - 25) / 60);
  }
  if (code === 0)                return 3.0;  // clear — lazy spin
  if (code <= 2)                 return 2.5;  // partly cloudy — gentle
  if (code === 3)                return 2.0;  // overcast
  if (code === 45 || code === 48) return 3.5; // fog — barely moving
  if (code === 51)               return 3.2;  // light drizzle — very slow mist
  if (code === 53)               return 2.8;  // drizzle
  if (code === 55)               return 2.2;  // heavy drizzle
  if (code === 56)               return 3.0;  // light freezing drizzle
  if (code === 57)               return 2.4;  // heavy freezing drizzle
  if (code === 61)               return 2.4;  // light rain
  if (code === 63)               return 1.8;  // rain
  if (code === 65)               return 1.2;  // heavy rain
  if (code === 66)               return 2.0;  // light freezing rain
  if (code === 67)               return 1.4;  // heavy freezing rain
  if (code >= 80 && code <= 82)  return Math.max(0.8, 2.0 - (code - 80) * 0.5); // showers
  if (code === 71)               return 3.0;  // light snow — slow flutter
  if (code === 73)               return 2.4;  // snow
  if (code === 75)               return 1.8;  // heavy snow
  if (code >= 95)                return Math.max(0.5, 0.8 - (code - 95) * 0.1); // thunderstorm — fast; heavier = faster
  return 2.5;
}

function wmoDesc(code) {
  const m = {
    0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
    45:'Fog', 48:'Icy fog',
    51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
    61:'Light rain', 63:'Rain', 65:'Heavy rain',
    71:'Light snow', 73:'Snow', 75:'Heavy snow', 77:'Snow grains',
    80:'Rain showers', 81:'Heavy showers', 82:'Violent showers',
    85:'Snow showers', 86:'Heavy snow showers',
    95:'Thunderstorm', 96:'Thunderstorm w/ hail', 99:'Heavy thunderstorm',
  };
  return m[code] || 'Unknown';
}

function fmtBlockSize(bytes) {
  if (!bytes) return '—';
  if (bytes >= 1e6) return `${(bytes / 1e6).toFixed(2)} MB`;

}

function timeAgoUnix(ts) {
  const diff = Math.floor(Date.now() / 1000 - ts);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  return `${Math.floor(diff / 3600)}h ago`;
}

function fmtBestDiff(v) {
  if (!v || v <= 0) return '—';
  if (v >= 1e12) return `${(v / 1e12).toFixed(2)}T`;
  if (v >= 1e9)  return `${(v / 1e9).toFixed(2)}G`;
  if (v >= 1e6)  return `${(v / 1e6).toFixed(2)}M`;
  if (v >= 1e3)  return `${(v / 1e3).toFixed(1)}K`;
  return String(v);
}

function classifyTopic(title) {
  const t = (title || '').toLowerCase();
  if (/breaking|urgent/.test(t)) return 'BREAKING';
  if (/etf|fund|inflow|outflow|rally|dump|\bprice\b|market|trade|exchange|bull|bear|\bspot\b|futures|options|invest|portfolio|microstrategy|blackrock|institutional|hedge/.test(t)) return 'MARKETS';
  if (/mining|miner|hashrate|hash rate|difficulty|\bpool\b|asic|block reward|halving|antpool|foundry|f2pool|marathon|riot/.test(t)) return 'MINING';
  if (/\bsec\b|regulat|legal|government|congress|senate|polic|ban|\bcourt\b|compli|\bkyc\b|\baml\b|treasury|\birs\b|\btax\b|\blaw\b/.test(t)) return 'REGULATION';
  if (/lightning|protocol|upgrade|developer|wallet|layer.?2|taproot|ordinals|runes|\bbip\b|fork|\bnode\b/.test(t)) return 'TECH';
  if (/el salvador|central bank|\bcbdc\b|reserve|national|strategic|country|nation|adopt/.test(t)) return 'GLOBAL';
  return 'BITCOIN';
}

function _processSvg(raw, uid, speedMult, sz) {
  const pfx = `wi${uid}`;
  const ids = [];
  raw.replace(/\bid="([^"]+)"/g, (_, id) => ids.push(id));
  let out = raw;
  // Namespace every id and its references so duplicate icons don't clash in the DOM
  ids.forEach(id => {
    const e   = id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const nid = `${pfx}-${id}`;
    out = out
      .replace(new RegExp(`id="${e}"`, 'g'),           `id="${nid}"`)
      .replace(new RegExp(`url\\(#${e}\\)`, 'g'),      `url(#${nid})`)
      .replace(new RegExp(`href="#${e}"`, 'g'),         `href="#${nid}"`)
      .replace(new RegExp(`xlink:href="#${e}"`, 'g'),  `xlink:href="#${nid}"`);
  });
  // Scale all SMIL animation durations
  out = out
    .replace(/\bdur="([\d.]+)s"/g,  (_, n) => `dur="${(parseFloat(n) * speedMult).toFixed(3)}s"`)
    .replace(/\bdur="([\d.]+)ms"/g, (_, n) => `dur="${Math.round(parseFloat(n) * speedMult)}ms"`);
  out = out.replace(/<svg /, `<svg width="${sz}" height="${sz}" `);
  return out;
}


// ─── API Fetch Helpers ────────────────────────────────────────
// Extracted from Command Center.html
// All functions use fetch() with 5s timeout and sensible error handling

const FETCH_TIMEOUT = 5000;

/**
 * Fetch BTC price from Kraken
 * Returns: { price, open, chgAbs, chgPct, hi, lo, vwap, volBtc }
 */
async function fetchBTCPrice() {
  try {
    const r = await fetch('https://api.kraken.com/0/public/Ticker?pair=XBTUSD', {
      signal: AbortSignal.timeout(FETCH_TIMEOUT),
    });
    if (!r.ok) throw new Error('kraken api not ok');
    const j = await r.json();
    if (j.error && j.error.length) throw new Error(j.error[0]);

    const t = j.result.XXBTZUSD;
    const price = parseFloat(t.c[0]);
    const open = parseFloat(t.o);
    const chgAbs = price - open;
    const chgPct = ((price - open) / open) * 100;
    const hi = parseFloat(t.h[1]);
    const lo = parseFloat(t.l[1]);
    const vwap = parseFloat(t.p[1]);
    const volBtc = parseFloat(t.v[1]);

    return { price, chgAbs, chgPct, hi, lo, vwap, volBtc };
  } catch (err) {
    console.error('fetchBTCPrice error:', err);
    return {};
  }
}

/**
 * Fetch chain stats from Mempool.space
 * Returns: { height, hashrate, difficulty, mempoolBytes, mempoolTx, feeFast, feeMid, feeEco,
 *            diffAdj, previousDiffAdj, previousRetargetDate, blockTimeMs, remainingBlocks,
 *            progressPercent, estimatedRetargetDate }
 */
async function fetchChainStats() {
  try {
    const [blockRes, hashrateRes, feesRes, mempoolRes, diffRes] = await Promise.all([
      fetch('https://mempool.space/api/blocks/tip/height', { signal: AbortSignal.timeout(FETCH_TIMEOUT) }),
      fetch('https://mempool.space/api/v1/mining/hashrate/3d', { signal: AbortSignal.timeout(FETCH_TIMEOUT) }),
      fetch('https://mempool.space/api/v1/fees/recommended', { signal: AbortSignal.timeout(FETCH_TIMEOUT) }),
      fetch('https://mempool.space/api/mempool', { signal: AbortSignal.timeout(FETCH_TIMEOUT) }),
      fetch('https://mempool.space/api/v1/difficulty-adjustment', { signal: AbortSignal.timeout(FETCH_TIMEOUT) }),
    ]);

    if (!blockRes.ok || !hashrateRes.ok || !feesRes.ok || !mempoolRes.ok || !diffRes.ok) {
      throw new Error('mempool api response not ok');
    }

    const height = await blockRes.json();
    const hashrateData = await hashrateRes.json();
    const fees = await feesRes.json();
    const mempool = await mempoolRes.json();
    const diff = await diffRes.json();

    const currentHashrate = hashrateData.currentHashrate || 0;
    const currentDiff = diff.difficultyChange !== undefined
      ? diff.difficulty || hashrateData.currentDifficulty
      : hashrateData.currentDifficulty;

    return {
      height,
      hashrate: currentHashrate,
      difficulty: currentDiff || hashrateData.currentDifficulty,
      mempoolBytes: mempool.vsize,
      mempoolTx: mempool.count,
      feeFast: fees.fastestFee,
      feeMid:  fees.halfHourFee,
      feeEco:  fees.economyFee,
      diffAdj: diff.difficultyChange,
      previousDiffAdj: diff.previousRetarget,
      // Approximation: elapsed blocks × current-epoch timeAvg. Accurate to within a few hours.
      previousRetargetDate: (diff.remainingBlocks != null && diff.timeAvg)
        ? Math.round((Date.now() - (2016 - diff.remainingBlocks) * diff.timeAvg) / 1000)
        : null,
      blockTimeMs: diff.timeAvg,
      remainingBlocks: diff.remainingBlocks,
      progressPercent: diff.progressPercent,
      estimatedRetargetDate: diff.estimatedRetargetDate,
    };
  } catch (err) {
    console.error('fetchChainStats error:', err);
    return {};
  }
}

/**
 * Fetch weather from Open-Meteo
 * Returns: { temp, feels, wxCond, wxCode, wxWindSpeed, wxWind, wxHum, wxHi, wxLo, wxSunriseHr, wxSunsetHr, hourly }
 */
async function fetchWeather(lat, lng, tempUnit = 'fahrenheit', tzName = 'auto') {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,wind_gusts_10m,pressure_msl,dew_point_2m&hourly=temperature_2m,weather_code,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,wind_speed_10m_max&temperature_unit=${tempUnit}&wind_speed_unit=mph&forecast_days=1&timezone=${tzName}`;

    const r = await fetch(url, { signal: AbortSignal.timeout(FETCH_TIMEOUT) });
    if (!r.ok) throw new Error('open-meteo api not ok');
    const j = await r.json();

    const cur = j.current;
    const windDirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
    const windDir = windDirs[Math.round(cur.wind_direction_10m / 45) % 8];
    const now = new Date();
    const curHour = now.getHours();

    // Build 8 hourly slots starting from current hour
    const hourly = [];
    for (let i = 0; i < 8; i++) {
      const idx = j.hourly.time.findIndex(t => {
        const h = new Date(t).getHours();
        return h === (curHour + i) % 24;
      });
      if (idx >= 0) {
        const t = new Date(j.hourly.time[idx]);
        const hr = t.getHours();
        hourly.push({
          hr,
          t: Math.round(j.hourly.temperature_2m[idx]),
          code: j.hourly.weather_code[idx],
          pop: j.hourly.precipitation_probability[idx] ?? 0,
        });
      }
    }

    return {
      temp: Math.round(cur.temperature_2m),
      feels: Math.round(cur.apparent_temperature),
      wxCond: cur.weather_code,

/**
 * Fetch multiple RSS feeds via rss2json
 * Returns: array of feed items sorted by pubDate
 */
async function fetchRSSFeeds(feeds = [], apiKey = '') {
  try {
    if (!Array.isArray(feeds) || feeds.length === 0) {
      return [];
    }

    const key = apiKey ? `&api_key=${apiKey}` : '';
    const results = await Promise.allSettled(
      feeds.map(async feedUrl => {
        const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}${key}`;
        const r = await fetch(url, { signal: AbortSignal.timeout(FETCH_TIMEOUT) });
        if (!r.ok) throw new Error('rss2json api not ok');
        const j = await r.json();
        if (j.status !== 'ok') throw new Error('rss2json status not ok');

        const src = j.feed.title || new URL(feedUrl).hostname;
        return j.items.map(it => ({
          cat: (it.categories && it.categories[0]) ? it.categories[0].toUpperCase().slice(0, 20) : 'BITCOIN',
          topic: classifyTopic(it.title),
          hed: it.title,
          src,
          pubDate: it.pubDate,
          link: it.link,
          img: it.thumbnail
            || (it.enclosure && it.enclosure.type && it.enclosure.type.startsWith('image/') ? it.enclosure.link : null)
            || (it.description ? (it.description.match(/<img\b[^>]*\bsrc=["']([^"']+)["']/i) || [])[1] || null : null)
            || null,
          snippet: it.description
            ? it.description.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim().slice(0, 1000)
            : '',
        }));
      })
    );

    const all = results
      .filter(r => r.status === 'fulfilled')
      .flatMap(r => r.value)
      .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    return all;
  } catch (err) {
    console.error('fetchRSSFeeds error:', err);
    return [];
  }
}

function LineChart({ color, points, fill, vwap }) {
  const T = useT();
  color = color ?? T.orange;

  const containerRef = React.useRef(null);
  const [dims, setDims] = React.useState({ w: 0, h: 0 });

  React.useLayoutEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver(([entry]) => {
      const { width, height } = entry.contentRect;
      setDims({ w: Math.round(width), h: Math.round(height) });
    });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, []);

  const { w, h } = dims;
  const useFallback = !points || points.length < 2;
  let pts = [];

  if (w > 0 && h > 0) {
    if (useFallback) {
      let s = 12347;
      const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
      for (let i = 0; i <= 80; i++) {
        const x = (i / 80) * w;
        const base = Math.sin(i * 0.18) * h * 0.3 + Math.sin(i * 0.42) * h * 0.08 + (i / 80) * h * 0.18;
        const y = h * 0.6 - base + (rnd() - 0.5) * 2;
        pts.push([x.toFixed(1), Math.max(2, Math.min(h - 2, y)).toFixed(1)]);
      }
    } else {
      const prices = points.map(p => p[1]);
      const minP = Math.min(...prices);
      const maxP = Math.max(...prices);
      const range = maxP - minP || 1;
      pts = points.map((p, i) => {
        const x = (i / (points.length - 1)) * w;
        const y = h - 4 - ((p[1] - minP) / range) * (h - 8);
        return [x.toFixed(1), Math.max(2, Math.min(h - 2, y)).toFixed(1)];
      });
    }
  }

  let vwapY = null;
  if (w > 0 && h > 0 && !useFallback && vwap != null) {
    const prices = points.map(p => p[1]);
    const minP = Math.min(...prices);
    const maxP = Math.max(...prices);
    const range = maxP - minP || 1;
    vwapY = Math.max(2, Math.min(h - 2, h - 4 - ((vwap - minP) / range) * (h - 8)));
  }

  const d = pts.length > 0
    ? pts.map((p, i) => `${i ? 'L' : 'M'}${p[0]},${p[1]}`).join(' ')
    : '';
  const lastPt = pts[pts.length - 1];

  return (
    <div ref={containerRef} style={{ width: '100%', height: '100%', display: 'block', flexShrink: 0 }}>
      {w > 0 && h > 0 && (
        <svg width={w} height={h} style={{ display: 'block' }}>
          {fill && d && <path d={`${d} L${w},${h} L0,${h}Z`} fill={color} fillOpacity={0.07} />}
          {vwapY != null && (
            <line x1={0} y1={vwapY} x2={w} y2={vwapY}
              stroke={T.ink3} strokeWidth={1} strokeDasharray="3 4" />
          )}
          {d && <path d={d} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />}
          {lastPt && <circle cx={lastPt[0]} cy={lastPt[1]} r={3} fill={color} />}
          {lastPt && <circle cx={lastPt[0]} cy={lastPt[1]} r={7} fill="none" stroke={color} strokeOpacity={0.3} strokeWidth={1} />}
        </svg>
      )}
    </div>
  );
}

function getOnThisDay(date) {
  const mo = date.getMonth() + 1;
  const d  = date.getDate();
  let best = null, bestDist = Infinity;
  for (const e of BTC_HISTORY) {
    const eDoy = e.mo * 31 + e.d;
    const tDoy = mo * 31 + d;
    const dist = Math.min(Math.abs(eDoy - tDoy), 31 * 12 - Math.abs(eDoy - tDoy));
    if (dist < bestDist) { bestDist = dist; best = e; }
  }
  return best;
}

/**
 * useResettableInterval
 *
 * Like setInterval, but exposes a reset() that clears the current interval,
 * fetches immediately, and starts a fresh one. This prevents double-fetching
 * shortly after a manual refresh.
 */
function useResettableInterval(callback, delay) {
  const idRef = useRef(null);
  const cbRef = useRef(callback);
  cbRef.current = callback;

  const start = useCallback(() => {
    if (idRef.current) clearInterval(idRef.current);
    idRef.current = setInterval(() => cbRef.current(), delay);
  }, [delay]);

  const reset = useCallback(() => {
    cbRef.current();
    start();
  }, [start]);

  useEffect(() => {
    cbRef.current();
    start();
    return () => { if (idRef.current) clearInterval(idRef.current); };
  }, [start]);

  return { reset };
}

 *
 * Returns: {
 *   timeHM: string (e.g., "14:30" or "2:30"),
 *   timeSec: string (e.g., ":45"),
 *   amPm: string (e.g., "PM" or ""),
 *   dayStr: string (e.g., "Monday, January 15"),
 *   dateShort: string (e.g., "2026-01-15"),
 *   loading: boolean,
 *   error: boolean
 * }
 */
function useClock(timeFormat = '24h') {
  const [now, setNow] = useState(new Date());

  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), CONFIG.REFRESH_INTERVALS.clock);
    return () => clearInterval(id);
  }, []);

  const pad = (n) => String(n).padStart(2, '0');
  const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

  const h = now.getHours();
  const m = now.getMinutes();
  const amPm = timeFormat === '12h' ? (h < 12 ? 'AM' : 'PM') : '';
  const dispH = timeFormat === '12h' ? String(h % 12 || 12) : pad(h);

  return {
    timeHM: `${dispH}:${pad(m)}`,
    timeSec: `:${pad(now.getSeconds())}`,
    amPm,
    dayStr: `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`,
    dateShort: now.toISOString().slice(0, 10),
    loading: false,
    error: false,
  };
}

/**
 * useBitaxe Hook
 * Fetches BitAxe miner data from API or direct IP polling
 *
 * Returns: {
 *   miners: array of miner objects with { ip, online, data? },
 *   err: boolean (true if all miners are offline),
 *   loading: boolean,
 *   lastOk: timestamp or null,
 *   interval: number (for feed health tracking)
 * }
 */
function useBitaxe(apiUrl, ips) {
  const [miners, setMiners] = useState([]);
  const [err, setErr] = useState(false);
  const [loading, setLoading] = useState(true);
  const [lastOk, setLastOk] = useState(null);

  const fetchBitaxe = useCallback(async () => {
    let next;
    if (apiUrl) {
      try {
        const r = await fetch(apiUrl, { signal: AbortSignal.timeout(5000) });
        if (!r.ok) throw new Error('api');
        const body = await r.json();
        next = body.miners;
      } catch {
        next = ips.map(ip => ({ ip, online: false }));
      }
    } else {
      const results = await Promise.allSettled(
        ips.map(async ip => {
          const r = await fetch(`http://${ip}/api/system/info`, { signal: AbortSignal.timeout(5000) });
          if (!r.ok) throw new Error('bitaxe');
          const data = await r.json();
          return { ip, online: true, data };
        })
      );
      next = results.map((r, i) =>
        r.status === 'fulfilled' ? r.value : { ip: ips[i], online: false }
      );
    }
    setMiners(next);
    setErr(next.every(m => !m.online));
    setLoading(false);
    setLastOk(Date.now());
  }, [apiUrl, ips.join(',')]); // eslint-disable-line react-hooks/exhaustive-deps

  const { reset: resetBitaxe } = useResettableInterval(fetchBitaxe, CONFIG.REFRESH_INTERVALS.bitaxe);

  // Re-fetch immediately when API URL or IPs change (preserves original behavior)
  const hasMountedRef = useRef(false);
  useEffect(() => {
    if (!hasMountedRef.current) { hasMountedRef.current = true; return; }
    resetBitaxe();
  }, [apiUrl, ips.join(',')]); // eslint-disable-line react-hooks/exhaustive-deps

  return {
    miners,
    err,
    loading,
    lastOk,
    interval: CONFIG.REFRESH_INTERVALS.bitaxe,
    refresh: resetBitaxe,
  };
}





/**
 * useWeather Hook
 * Fetches weather from Open-Meteo API
 *
 * Returns: {
 *   data: object with { temp, feels, wxCond, wxCode, wxWindSpeed, wxWind, wxHum, wxHi, wxLo, wxSunriseHr, wxSunsetHr, wxSunrise, wxSunset, wxSunriseTomorrow, hourly, wxUVIndex, wxUVIndexTomorrow, wxPressure, wxDewPoint, wxGusts, wxDailyWindMax, wxPrecipTotal },
 *   err: boolean,
 *   lastOk: timestamp or null,
 *   interval: number (for feed health tracking)
 * }
 */
function useWeather(lat, lng, tempUnit) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(false);
  const [lastOk, setLastOk] = useState(null);

  const fetchWeather = useCallback(async () => {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,wind_gusts_10m,pressure_msl,dew_point_2m&hourly=temperature_2m,weather_code,precipitation_probability,precipitation&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,uv_index_max,wind_speed_10m_max&temperature_unit=${tempUnit}&wind_speed_unit=mph&forecast_days=2&timezone=auto`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('weather');
      const j = await r.json();

      const cur = j.current;
      const windDirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      const windDir = windDirs[Math.round(cur.wind_direction_10m / 45) % 8];
      const now = new Date();
      const curHour = now.getHours();

      // Build 8 hourly slots starting from current hour
      const hourly = [];
      for (let i = 0; i < 8; i++) {
        const idx = j.hourly.time.findIndex(t => {
          const h = new Date(t).getHours();
          return h === (curHour + i) % 24;
        });
        if (idx >= 0) {
          const t = new Date(j.hourly.time[idx]);
          const hr = t.getHours();
          hourly.push({
            hr,
            t: Math.round(j.hourly.temperature_2m[idx]),
            code: j.hourly.weather_code[idx],
            pop: j.hourly.precipitation_probability[idx] ?? 0,
            precip: j.hourly.precipitation?.[idx] ?? 0,
          });
        }
      }

      setData({
        temp: Math.round(cur.temperature_2m),
        feels: Math.round(cur.apparent_temperature),
        wxCond: wmoDesc(cur.weather_code),
        wxCode: cur.weather_code,
        wxWindSpeed: Math.round(cur.wind_speed_10m),
        wxWind: `${windDir} ${Math.round(cur.wind_speed_10m)} mph`,
        wxHum: `${cur.relative_humidity_2m}%`,
        wxHi: Math.round(j.daily.temperature_2m_max[0]),
        wxLo: Math.round(j.daily.temperature_2m_min[0]),
        wxSunriseHr: parseInt(j.daily.sunrise[0].split('T')[1]),
        wxSunsetHr: parseInt(j.daily.sunset[0].split('T')[1]),
        wxSunrise: j.daily.sunrise[0].split('T')[1]?.slice(0, 5),
        wxSunset: j.daily.sunset[0].split('T')[1]?.slice(0, 5),
        wxSunriseTomorrow: j.daily.sunrise[1]?.split('T')[1]?.slice(0, 5),
        wxPrecipTotal: j.daily.precipitation_sum?.[0] != null ? j.daily.precipitation_sum[0].toFixed(1) : null,
        wxUVIndex: j.daily.uv_index_max?.[0] != null ? Math.round(j.daily.uv_index_max[0]) : null,
        wxUVIndexTomorrow: j.daily.uv_index_max?.[1] != null ? Math.round(j.daily.uv_index_max[1]) : null,
        wxDailyWindMax: j.daily.wind_speed_10m_max?.[0] != null ? Math.round(j.daily.wind_speed_10m_max[0]) : null,
        wxGusts: cur.wind_gusts_10m != null ? Math.round(cur.wind_gusts_10m) : null,
        wxPressure: cur.pressure_msl != null ? Math.round(cur.pressure_msl) : null,
        wxDewPoint: cur.dew_point_2m != null ? Math.round(cur.dew_point_2m) : null,
        hourly: hourly.slice(0, 8),
      });
      setErr(false);
      setLastOk(Date.now());
    } catch {
      setErr(true);
    }
  }, [lat, lng, tempUnit]);

  const { reset: resetWeather } = useResettableInterval(fetchWeather, CONFIG.REFRESH_INTERVALS.weather);

  // Re-fetch immediately when location or units change (preserves original behavior)
  const hasMountedRef = useRef(false);
  useEffect(() => {
    if (!hasMountedRef.current) { hasMountedRef.current = true; return; }
    resetWeather();
  }, [lat, lng, tempUnit]); // eslint-disable-line react-hooks/exhaustive-deps

  return {
    data,
    err,
    lastOk,
    interval: CONFIG.REFRESH_INTERVALS.weather,
    refresh: resetWeather,
  };
}






function useRSS() {
  const [items, setItems] = useState([]);
  const [err, setErr] = useState(false);
  const [leadStory, setLeadStory] = useState(null);
  const [lastOk, setLastOk] = useState(null);

  const fetchRSS = useCallback(async () => {
    const key = CONFIG.RSS2JSON_KEY ? `&api_key=${CONFIG.RSS2JSON_KEY}` : '';
    const feeds = CONFIG.RSS_FEEDS || [];

    const results = await Promise.allSettled(
      feeds.map(async feedUrl => {
        const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}${key}`;
        const r = await fetch(url);
        if (!r.ok) throw new Error('rss');
        const j = await r.json();
        if (j.status !== 'ok') throw new Error('rss-status');
        const src = j.feed.title || new URL(feedUrl).hostname;
        return j.items.map(it => ({
          cat: it.categories && it.categories[0] ? it.categories[0].toUpperCase().slice(0, 20) : 'BITCOIN',
          topic: classifyTopic(it.title),
          hed: it.title,
          src,
          pubDate: it.pubDate,
          t: timeAgo(it.pubDate),
          link: it.link,
          img:
            it.thumbnail ||
            (it.enclosure && it.enclosure.type && it.enclosure.type.startsWith('image/') ? it.enclosure.link : null) ||
            (it.description ? (it.description.match(/<img\b[^>]*\bsrc=["']([^"']+)["']/i) || [])[1] || null : null) ||
            null,
          snippet: it.description
            ? it.description.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim().slice(0, 1000)
            : '',
        }));
      })
    );

    const all = results
      .filter(r => r.status === 'fulfilled')
      .flatMap(r => r.value)
      .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    if (all.length > 0) {
      setLeadStory(all[0]);
      setItems(all.slice(1, 15));
      setErr(false);
      setLastOk(Date.now());
    } else {
      setErr(true);
    }
  }, []);

  const { reset: resetRSS } = useResettableInterval(fetchRSS, CONFIG.REFRESH_INTERVALS.news);

  // Refresh relative times every minute
  useEffect(() => {
    const id = setInterval(() => {
      setItems(prev => prev.map(it => ({ ...it, t: timeAgo(it.pubDate) })));
      setLeadStory(prev => prev ? { ...prev, t: timeAgo(prev.pubDate) } : prev);
    }, 60000);
    return () => clearInterval(id);
  }, []);

  return {
    items,
    leadStory,
    err,
    lastOk,
    interval: CONFIG.REFRESH_INTERVALS.news,
    refresh: resetRSS,
  };
}



/**
 * useFeedHealth Hook
 * Monitors health of all feeds (loading, live, degraded, offline)
 *
 * Returns status string: 'loading' | 'live' | 'degraded' | 'offline'
 *
 * Logic:
 * - 'loading': Initial state
 * - 'live': All feeds are recent (lastOk within 2x interval)
 * - 'degraded': Some feeds are stale but not all
 * - 'offline': All feeds are stale
 */
function useFeedHealth(feeds) {
  const [status, setStatus] = useState('loading');
  const ref = useRef(feeds);
  ref.current = feeds;

  useEffect(() => {
    const check = () => {
      const now = Date.now();
      const stale = ref.current.filter(f => !f.lastOk || now - f.lastOk > (f.interval || 60000) * 2).length;
      if (stale === 0) setStatus('live');
      else if (stale < ref.current.length) setStatus('degraded');
      else setStatus('offline');
    };
    check();
    const id = setInterval(check, 5000);
    return () => clearInterval(id);
  }, []);

  return status;
}




/**
 * usePageRefresh
 *
 * Triggers an immediate staggered refresh of all feeds on two events:
 *   1. Tab becomes visible after being hidden for >= HIDDEN_STALE_THRESHOLD (30s)
 *   2. Network comes back online (window 'online' event)
 *
 * Staggering prevents a thundering herd against external APIs.
 */
function usePageRefresh(refreshFns) {
  const hiddenAtRef = useRef(null);
  const fnsRef = useRef(refreshFns);
  fnsRef.current = refreshFns;

  useEffect(() => {
    const threshold = CONFIG.HIDDEN_STALE_THRESHOLD ?? 30_000;
    const stagger   = CONFIG.REFRESH_STAGGER_MS    ?? 100;

    function runAll() {
      fnsRef.current.forEach((fn, i) =>
        setTimeout(() => typeof fn === 'function' && fn(), i * stagger)
      );
    }

    function onVisibility() {
      if (document.hidden) {
        hiddenAtRef.current = Date.now();
      } else {
        const was = hiddenAtRef.current;
        hiddenAtRef.current = null;
        if (was !== null && Date.now() - was >= threshold) runAll();
      }
    }

    document.addEventListener('visibilitychange', onVisibility);
    window.addEventListener('online', runAll);
    return () => {
      document.removeEventListener('visibilitychange', onVisibility);
      window.removeEventListener('online', runAll);
    };
  }, []);
}



// SYNC: must match isMobile check in index.html updateScale() and @media (max-width:900px)

function useLayoutSize() {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < MOBILE_BREAKPOINT);

  useEffect(() => {
    const handle = () => setIsMobile(window.innerWidth < MOBILE_BREAKPOINT);

function Ticker({ chain, feedHealth }) {
  const T = useT();

  const blockHeight = chain.data ? fmtNum(chain.data.height) : '—';
  const mempoolMB   = chain.data ? `${(chain.data.mempoolBytes / 1e6).toFixed(0)} MB` : '—';
  const mempoolTx   = chain.data ? fmtNum(chain.data.mempoolTx) : '—';
  const epochPct    = chain.data?.progressPercent;
  const rawBlockTime = chain.data?.blockTimeMs;
  const blockTimeCol = rawBlockTime == null ? T.ink : rawBlockTime / 1000 < 570 ? T.orange : rawBlockTime / 1000 <= 630 ? T.green : T.red;
  const blocksToClr  = chain.data ? Math.ceil(chain.data.mempoolBytes / 1_000_000) : null;
  const blocksToClrCol= blocksToClr == null ? T.ink : blocksToClr <= 2 ? T.green : blocksToClr <= 8 ? T.ink : T.red;

  return (
    <div style={{ display:'flex', alignItems:'center', padding:'9px 0', borderBottom:`1px solid ${T.rule2}`, fontFamily:T.mono, fontSize:12, overflow:'hidden' }}>
      <span style={{ fontFamily:T.sans, fontWeight:700, fontSize:9, letterSpacing:2, color:T.ink3, display:'flex', alignItems:'center', gap:4, flexShrink:0, marginRight:20 }}>
        LIVE
        <span style={{
          color: feedHealth === 'live' ? '#d63030' : feedHealth === 'degraded' ? T.orange : T.ink4,
          animation: feedHealth === 'live' ? 'live-pulse 1.4s ease-in-out infinite' : 'none',
          display: 'inline-block',
          lineHeight: 1,
        }}>⏺</span>
      </span>
      <div style={{ flex:1, overflow:'hidden' }}>
        <div style={{ display:'inline-flex', whiteSpace:'nowrap', animation:'ticker-scroll 100s linear infinite', willChange:'transform', backfaceVisibility:'hidden', WebkitFontSmoothing:'subpixel-antialiased' }}>
          {(() => {
            const halvingBlocksLeft = chain.data
              ? fmtNum(Math.ceil((chain.data.height + 1) / 210000) * 210000 - chain.data.height)
              : '—';
            const items = [
              ['BLOCK',   blockHeight,                                                                                    'latest',                                                                                          T.ink3],
              ['HASH',    chain.data ? fmtHashrate(chain.data.hashrate) : '—',                                           chain.data && chain.data.diffAdj != null ? `${chain.data.diffAdj >= 0 ? '+' : ''}${chain.data.diffAdj.toFixed(1)}%` : '', T.ink3],
              ['TIME',    chain.data ? fmtBlockTime(chain.data.blockTimeMs) : '—',                                       'avg',                                                                                             blockTimeCol],
              ['EPOCH',   epochPct != null ? `${epochPct.toFixed(0)}%` : '—',                                            chain.data ? `${fmtNum(chain.data.remainingBlocks)} blk left` : '',                               T.ink3],
              ['FEE',     chain.data ? `${chain.data.feeFast} sat/vB` : '—',                                             chain.data ? `eco ${chain.data.feeEco}` : '',                                                     T.ink3],
              ['MEMPOOL', mempoolMB,                                                                                      `${mempoolTx} tx`,                                                                                 blocksToClrCol],
              ['CLR',     blocksToClr != null ? `${blocksToClr} blk` : '—',                                              'to clear',                                                                                        blocksToClrCol],
              ['SUPPLY',  chain.data ? chain.data.circulating : '—',                                                     '',                                                                                                T.ink3],
              ['HALVING', chain.data?.nextHalvingDate || '—',                                                             halvingBlocksLeft !== '—' ? `${halvingBlocksLeft} blk` : '',                                      T.ink3],
            ];
            const renderItem = ([k, v, s, sc], pfx) => (
              <span key={pfx} style={{ display:'inline-flex', alignItems:'baseline', gap:5, paddingRight:36, flexShrink:0 }}>
                <span style={{ color:T.ink3, letterSpacing:1 }}>{k}</span>
                <b style={{ fontWeight:600, color:T.ink }}>{v}</b>
                {s && <span style={{ color:sc }}>{s}</span>}
              </span>
            );
            return [
              ...items.map((item, i) => renderItem(item, `a${i}`)),
              ...items.map((item, i) => renderItem(item, `b${i}`)),
            ];
          })()}
        </div>
      </div>
    </div>
  );
}









function Chain({ chain }) {
  const T = useT();

  const blockHeight = chain.data ? fmtNum(chain.data.height) : '—';
  const hashrate    = chain.data ? fmtHashrate(chain.data.hashrate) : '—';
  const difficulty  = chain.data ? fmtDiff(chain.data.difficulty) : '—';
  const mempoolMB   = chain.data ? fmtMempoolMB(chain.data.mempoolBytes) : '—';
  const mempoolTx   = chain.data ? fmtNum(chain.data.mempoolTx) : '—';
  const feeFast     = chain.data ? `${chain.data.feeFast} sat/vB` : '—';
  const feeEco      = chain.data ? `${chain.data.feeEco} sat/vB` : '—';

  const diffAdjVal    = chain.data?.diffAdj;
  const diffAdjStr    = diffAdjVal != null ? `${diffAdjVal >= 0 ? '+' : ''}${diffAdjVal.toFixed(2)}%` : '—';
  const diffAdjCol    = diffAdjVal != null ? (diffAdjVal >= 0 ? T.green : T.red) : T.ink;
  const epochPct      = chain.data?.progressPercent;
  const epochBlocks   = chain.data ? Math.round((epochPct / 100) * 2016) : null;
  const epochStr      = epochPct != null ? `${epochPct.toFixed(0)}% · ${epochBlocks}/2016` : '—';
  const retargetDate  = chain.data?.estimatedRetargetDate ? new Date(chain.data.estimatedRetargetDate).toISOString().slice(0,10) : '—';
  const blockTimeSec  = chain.data?.blockTimeMs ? chain.data.blockTimeMs / 1000 : null;
  const blockTimeCol  = blockTimeSec == null ? T.ink : blockTimeSec < 570 ? T.orange : blockTimeSec <= 630 ? T.green : T.red;
  const blocksToClr   = chain.data ? Math.ceil(chain.data.mempoolBytes / 1_000_000) : null;
  const blocksToClrCol= blocksToClr == null ? T.ink : blocksToClr <= 2 ? T.green : blocksToClr <= 8 ? T.ink : T.red;
  const rawFeeFast    = chain.data?.feeFast;
  const rawFeeEco     = chain.data?.feeEco;
  const feeFastCol    = rawFeeFast == null ? T.ink : rawFeeFast < 10 ? T.green : rawFeeFast < 50 ? T.ink : T.red;
  const feeEcoCol     = rawFeeEco  == null ? T.ink : rawFeeEco  < 5  ? T.green : rawFeeEco  < 20 ? T.ink : T.red;
  const rawMempoolMB  = chain.data ? chain.data.mempoolBytes / 1e6 : null;
  const mempoolCol    = rawMempoolMB == null ? T.ink : rawMempoolMB < 10 ? T.green : rawMempoolMB < 50 ? T.ink : T.red;
  const rawMempoolTx  = chain.data?.mempoolTx;
  const mempoolTxCol  = rawMempoolTx == null ? T.ink : rawMempoolTx < 5000 ? T.green : rawMempoolTx < 20000 ? T.ink : T.red;

  const miningRows = [
    { k: 'Hashrate',      v: hashrate },
    { k: 'Difficulty',    v: difficulty },
    { k: 'Avg block',     v: chain.data?.blockTimeMs ? fmtBlockTime(chain.data.blockTimeMs) : '—', c: blockTimeCol },
    { k: 'Diff adjust',   v: diffAdjStr, c: diffAdjCol },
    { k: 'Retarget in',   v: chain.data?.remainingBlocks != null ? `${fmtNum(chain.data.remainingBlocks)} blk` : '—' },
    { k: 'Retarget date', v: retargetDate },
    { k: 'Epoch',         v: epochStr },
  ];
  const chainStatRows = [
    { k: 'Block height',  v: blockHeight },
    { k: 'Circulating',   v: chain.data ? chain.data.circulating : '—' },
    { k: 'Next halving',  v: chain.data ? chain.data.nextHalvingDate : '—' },
  ];
  const mempoolRows = [
    { k: 'Size',            v: mempoolMB,  c: mempoolCol },
    { k: 'Tx count',        v: mempoolTx,  c: mempoolTxCol },
    { k: 'Blocks to clear', v: blocksToClr != null ? `${blocksToClr} blk` : '—', c: blocksToClrCol },
    { k: 'Fee · fast',      v: feeFast,    c: feeFastCol },
    { k: 'Fee · eco',       v: feeEco,     c: feeEcoCol },
  ];

  const pools        = chain.pools        || [];
  const topPool      = pools[0];
  const topPoolBlocks = chain.topPoolBlocks || [];
  const recentBlocks = chain.recentBlocks  || [];
  const mempoolBlocks = chain.mempoolBlocks || [];

  return (
    <div>
      <Kicker>Chain vitals</Kicker>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 18px', marginTop:6 }}>
        {/* Column 1: Mining & Chain */}
        <div>
          <Kicker style={{ marginBottom:8 }}>Mining & Chain</Kicker>
          <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
            {[...miningRows, ...chainStatRows].map((r, i) => (
              <div key={i} style={{ borderLeft:`2px solid ${T.rule3}`, paddingLeft:8 }}>
                <Num size="sm" value={r.v} style={{ color: r.c || T.ink }} />
                <Kicker style={{ marginTop:2, fontSize:9 }}>{r.k}</Kicker>
              </div>
            ))}
          </div>
        </div>

        {/* Column 2: Mempool & Fees + Projected Blocks */}
        <div>
          <Kicker style={{ marginBottom:8 }}>Mempool & Fees</Kicker>
          <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
            {mempoolRows.map((r, i) => (
              <div key={i} style={{ borderLeft:`2px solid ${T.rule3}`, paddingLeft:8 }}>
                <Num size="sm" value={r.v} style={{ color: r.c || T.ink }} />
                <Kicker style={{ marginTop:2, fontSize:9 }}>{r.k}</Kicker>
              </div>
            ))}
            {mempoolBlocks.length > 0 && (
              <>
                <Kicker style={{ marginTop:6, marginBottom:2 }}>Projected</Kicker>
                {mempoolBlocks.map((b, i) => (
                  <div key={i} style={{ borderLeft:`2px solid ${T.rule3}`, paddingLeft:8 }}>
                    <Num size="sm" value={b.feeRange ? `${b.feeRange[0]}–${b.feeRange[1]} sat/vB` : `${b.medianFee} sat/vB`} />
                    <Kicker style={{ marginTop:2, fontSize:9 }}>{i === 0 ? 'Next block' : `+${i} block`} · {fmtNum(b.nTx)} txs</Kicker>
                  </div>
                ))}
              </>
            )}
          </div>
        </div>
      </div>

      {/* Mining Pools */}
      {pools.length > 0 && (
        <div style={{ marginTop:14 }}>
          <Kicker>Mining Pools · 7d</Kicker>
          <div style={{ fontFamily:T.num, fontSize:10, color:T.ink2, marginTop:5, lineHeight:1.8, wordBreak:'break-word' }}>
            {pools.map(p => `${p.name} ${p.sharePct}%`).join('  ·  ')}
          </div>
          {topPool && topPoolBlocks.length > 0 && (
            <div style={{ fontFamily:T.num, fontSize:9, color:T.ink3, marginTop:3 }}>
              Top pool: {topPool.name} · last block #{fmtNum(topPoolBlocks[0].height)} · {timeAgoUnix(topPoolBlocks[0].timestamp)}
            </div>
          )}
        </div>
      )}

      {/* Recent Blocks */}
      {recentBlocks.length > 0 && (
        <div style={{ marginTop:14 }}>
          <Kicker>Recent Blocks</Kicker>
          <div style={{ marginTop:5 }}>
            {recentBlocks.map((b, i) => (
              <div key={i} style={{
                display:'grid',
                gridTemplateColumns:'6ch 1fr 5ch 6ch 8ch 5ch',
                gap:'0 8px',
                fontFamily:T.mono,
                fontSize:10,
                color:T.ink2,
                padding:'3px 0',
                borderBottom:`1px solid ${T.rule3}`,
              }}>
                <span style={{ color:T.ink3 }}>#{fmtNum(b.height)}</span>
                <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{b.poolName}</span>
                <span>{fmtNum(b.txCount)}</span>
                <span>{fmtBlockSize(b.size)}</span>
                <span style={{ color:T.ink3 }}>{b.medianFee != null ? `${b.medianFee} s/vB` : '—'}</span>
                <span style={{ color:T.ink4 }}>{timeAgoUnix(b.timestamp)}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}










function Weather({ weather, prefs }) {
  const T = useT();
  const wx = weather.data;

  if (!wx) {
    return (
      <div>
        <Kicker>Weather</Kicker>
        <div style={{ fontFamily: T.num, fontSize: u(12), color: T.ink3, marginTop: u(8) }}>
          {weather.err ? 'weather unavailable' : 'loading…'}
        </div>
      </div>
    );
  }

  return (
    <div>
      <Kicker>Weather</Kicker>
      <div style={{ display: 'flex', alignItems: 'center', gap: u(12), marginTop: u(8) }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: u(4) }}>
          <WxGlyph kind={wmoIcon(wx.wxCode, new Date().getHours(), wx.wxWindSpeed, wx.wxSunriseHr, wx.wxSunsetHr)} size={48} speed={wmoSpeed(wx.wxCode, wx.wxWindSpeed)} />
          {(() => {
            let label = null;
            if (wx.wxSunrise && wx.wxSunset) {
              const now = new Date();
              const nowMins = now.getHours() * 60 + now.getMinutes();
              const [srH, srM] = wx.wxSunrise.split(':').map(Number);
              const [ssH, ssM] = wx.wxSunset.split(':').map(Number);
              const sunriseMins = srH * 60 + srM;
              const sunsetMins = ssH * 60 + ssM;
              if (nowMins < sunriseMins) {
                label = `↑ ${fmtHHMM(wx.wxSunrise, prefs.timeFormat)}`;
              } else if (nowMins < sunsetMins) {
                label = `↓ ${fmtHHMM(wx.wxSunset, prefs.timeFormat)}`;
              } else {
                label = wx.wxSunriseTomorrow ? `↑ ${fmtHHMM(wx.wxSunriseTomorrow, prefs.timeFormat)}` : null;
              }
            }
            return label ? <div style={{ fontFamily: T.num, fontSize: u(9), color: T.ink3, lineHeight: 1 }}>{label}</div> : null;
          })()}
        </div>
        <div>
          <Num size="lg" value={`${wx.temp}°`} unit={prefs.tempUnit === 'celsius' ? 'C' : 'F'} />
          <div style={{ fontFamily: T.body, fontStyle: 'italic', fontSize: u(12), color: T.ink2, marginTop: u(3) }}>
            {wx.wxCond} · H{wx.wxHi} L{wx.wxLo}
          </div>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8,1fr)', gap: u(4), marginTop: u(12), paddingTop: u(10), borderTop: `1px solid ${T.rule3}` }}>
        {wx.hourly.map((h, i) => (
          <div key={i} style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: T.num, fontSize: u(10), color: T.ink3 }}>{fmtHour(h.hr, prefs.timeFormat)}</div>
            <div style={{ margin: `${u(3)} auto` }}><WxGlyph kind={wmoIcon(h.code, h.hr, null, wx.wxSunriseHr, wx.wxSunsetHr)} size={24} speed={wmoSpeed(h.code)} /></div>
            <Num size="xs" value={`${h.t}°`} />
            {h.pop >= 30 && <div style={{ fontFamily: T.num, fontSize: u(9), color: T.ink3, marginTop: u(1) }}>{h.pop}%</div>}
            {h.precip > 0 && <div style={{ fontFamily: T.num, fontSize: u(9), color: T.ink3 }}>{h.precip.toFixed(1)}mm</div>}
          </div>
        ))}
      </div>
      {/* 3×2 stat grid */}
      {(() => {
        const curHour = new Date().getHours();
        const isNight = wx.wxSunriseHr != null && wx.wxSunsetHr != null
          ? (curHour < wx.wxSunriseHr || curHour >= wx.wxSunsetHr)
          : (curHour < 6 || curHour >= 20);
        const uv = isNight ? (wx.wxUVIndexTomorrow ?? 0) : (wx.wxUVIndex ?? 0);
        const uvColor = uv >= 8 ? T.red : uv >= 6 ? T.orange : uv < 3 ? T.green : T.ink;
        const uvLabel = uv >= 8 ? 'Very High' : uv >= 6 ? 'High' : uv >= 3 ? 'Moderate' : 'Low';
        const uvCellLabel = isNight ? 'UV Tomorrow' : 'UV Index';
        const br = `1px solid ${T.rule3}`;
        const cellL  = { padding: `${u(8)} ${u(8)} ${u(8)} 0`,  borderRight: br };
        const cellM  = { padding: `${u(8)}`,                     borderRight: br };
        const cellR  = { padding: `${u(8)} 0 ${u(8)} ${u(8)}` };
        const cellLB = { padding: `${u(8)} ${u(8)} 0 0`,         borderRight: br, borderTop: br };
        const cellMB = { padding: `${u(8)} ${u(8)} 0 ${u(8)}`,  borderRight: br, borderTop: br };
        const cellRB = { padding: `${u(8)} 0 0 ${u(8)}`,         borderTop: br };
        const lbl = { fontFamily: T.sans, fontSize: u(8), fontWeight: 600, letterSpacing: u(1.6), textTransform: 'uppercase', color: T.ink3, marginBottom: u(3) };
        const val = { fontFamily: T.num, fontSize: u(13), fontWeight: 400, letterSpacing: -0.5, lineHeight: 1, color: T.ink, fontFeatureSettings: '"tnum" 1, "lnum" 1', fontOpticalSizing: 'auto' };
        const sub = { fontFamily: T.num, fontSize: u(9), color: T.ink3, marginTop: u(2) };
        return (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', marginTop: u(10), borderTop: br }}>
            <div style={cellL}>
              <div style={lbl}>Feels Like</div>
              <div style={val}>{wx.feels}°{prefs.tempUnit === 'celsius' ? 'C' : 'F'}</div>
              {(() => {
                if (wx.wxPressure == null) return null;
                if (wx.wxPressure >= 1020) return <div style={sub}>dry &amp; clear</div>;
                if (wx.wxPressure < 1007) return <div style={sub}>humid &amp; unsettled</div>;
                return null;
              })()}
            </div>
            <div style={cellM}>
              <div style={lbl}>Humidity</div>
              <div style={val}>{wx.wxHum}</div>
            </div>
            <div style={cellR}>
              <div style={lbl}>Dew Point</div>
              <div style={val}>{wx.wxDewPoint != null ? `${wx.wxDewPoint}°` : '—'}</div>
            </div>
            <div style={cellLB}>
              <div style={lbl}>Wind</div>
              <div style={val}>{wx.wxWind}</div>
              {wx.wxGusts != null && <div style={sub}>gusts {wx.wxGusts} mph</div>}
            </div>
            <div style={cellMB}>
              <div style={lbl}>{uvCellLabel}</div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: u(4) }}>
                <div style={{ ...val, color: uvColor }}>{uv}</div>
                <div style={{ fontFamily: T.sans, fontSize: u(8), fontWeight: 600, color: uv >= 6 ? uvColor : T.ink3 }}>{uvLabel}</div>
              </div>
              <div style={{ height: u(2), background: T.rule3, borderRadius: 2, marginTop: u(5) }}>
                <div style={{ height: '100%', width: `${Math.min(uv / 11, 1) * 100}%`, background: uvColor, borderRadius: 2 }} />
              </div>
            </div>
            <div style={cellRB}>
              <div style={lbl}>Pressure</div>
              <div style={val}>{wx.wxPressure != null ? `${wx.wxPressure}` : '—'}</div>
              {wx.wxPressure != null && (() => {
                const isHigh = wx.wxPressure >= 1020;
                const isLow  = wx.wxPressure < 1007;
                const color  = isHigh ? T.green : isLow ? T.orange : T.ink3;
                const label  = isHigh ? 'High' : isLow ? 'Low' : 'Normal';
                return <div style={{ ...sub, color }}>{label} · hPa</div>;
              })()}
            </div>
          </div>
        );
      })()}
    </div>
  );
}







function Dot({ status }) {

  return (
    <span style={{
      display: 'inline-block', width: u(6), height: u(6), borderRadius: '50%',
      background: status === 'hashing' ? T.green : T.red,
      flexShrink: 0, marginRight: u(5), marginTop: u(1.5),
    }} />
  );
}

function getMinerStatus(miner) {
  return (miner.online && miner.data) ? 'hashing' : 'unreachable';
}

function getMinerName(miner) {
  if (miner.data?.hostname) return miner.data.hostname;
  const parts = (miner.ip || '').split('.');
  return `rig-${parts[parts.length - 1] || '(no IP)'}`;
}

function Miners({ bitaxe, chain }) {
  const T = useT();
  const heroWrapRef = React.useRef(null);
  const heroSlotRef = React.useRef(null);
  const [heroFontSize, setHeroFontSize] = React.useState(null);

  // minmax(0,1fr) prevents the name column from expanding beyond its share,
  // which would push the Watts column out of the container.
  const GRID = `minmax(0,1fr) ${u(52)} ${u(46)} ${u(44)} ${u(80)} ${u(48)} ${u(48)} ${u(52)}`;

  const onlineMiners = bitaxe.miners.filter(m => m.online && m.data);
  const minerCount   = bitaxe.miners.length;
  const onlineCount  = onlineMiners.length;

  const totalHashTH  = onlineMiners.reduce((s, m) => s + (m.data.hashRate || 0) / 1000, 0);
  const totalPower   = onlineMiners.reduce((s, m) => s + (m.data.power || 0), 0);
  const totalAcc     = bitaxe.miners.reduce((s, m) => s + (m.data?.sharesAccepted || 0), 0);
  const totalRej     = bitaxe.miners.reduce((s, m) => s + (m.data?.sharesRejected || 0), 0);
  const errRate      = totalRej > 0 ? ((totalRej / (totalAcc + totalRej)) * 100).toFixed(2) : null;

  const networkHashEH = chain.data ? chain.data.hashrate / 1e18 : 0;
  const oddsResult = chain.data && totalHashTH > 0
    ? calcSoloOdds(networkHashEH, totalHashTH)
    : null;
  const oddsOneIn = oddsResult ? oddsResult.oddsPerDay : null;

  React.useEffect(() => {
    if (!oddsOneIn) return;
    const text = `1-in-${oddsOneIn.toLocaleString()}`;
    const measure = () => {
      const wrap = heroWrapRef.current;
      if (!wrap) return;
      const PROBE = 200;
      const cs = getComputedStyle(wrap);
      const availW = wrap.getBoundingClientRect().width
        - parseFloat(cs.paddingLeft)
        - parseFloat(cs.paddingRight || '0')
        - parseFloat(cs.borderLeftWidth || '0')
        - parseFloat(cs.borderRightWidth || '0');
      if (availW <= 0) return;
      const clone = document.createElement('div');
      clone.style.cssText = 'position:absolute;top:-9999px;white-space:nowrap;' +
        'font-family:"Playfair Display",Georgia,serif;font-weight:800;font-style:italic;' +
        `font-size:${PROBE}px`;
      clone.textContent = text;
      document.body.appendChild(clone);
      const textW = clone.scrollWidth;
      document.body.removeChild(clone);
      if (textW > 0) {
        const newSize = Math.floor(PROBE * availW / textW);
        if (!heroSlotRef.current) heroSlotRef.current = newSize;
        setHeroFontSize(newSize);
      }
    };
    document.fonts.load('800 italic 200px "Playfair Display"').then(measure);
  }, [oddsOneIn]);

  const activeMiners = bitaxe.miners.filter(m => getMinerStatus(m) !== 'unreachable');
  const avgEff = activeMiners.length > 0
    ? activeMiners.reduce((s, m) => {
        const hr = (m.data?.hashRate || 0) / 1000;
        const eff = hr > 0 ? (m.data?.power || 0) / hr : 0;
        return s + eff;
      }, 0) / activeMiners.length
    : 0;
  const avgUp = activeMiners.length > 0
    ? activeMiners.reduce((s, m) => {
        const up = m.data?.uptimeSeconds != null
          ? Math.min(99.9, (m.data.uptimeSeconds / 86400) * 100)
          : 0;
        return s + up;
      }, 0) / activeMiners.length
    : null;
  const fmtPower = (w) => w < 1000 ? `${Math.round(w)}W` : `${(w / 1000).toFixed(1)}kW`;

  const avgAsic = activeMiners.length > 0
    ? activeMiners.reduce((s, m) => s + (m.data?.temp || m.data?.temperature || 0), 0) / activeMiners.length
    : 0;
  const vrAvailable = bitaxe.miners.some(m => m.data?.vrTemp != null);
  const avgVr = vrAvailable && activeMiners.length > 0
    ? activeMiners.reduce((s, m) => s + (m.data?.vrTemp || 0), 0) / activeMiners.length
    : null;

  const HEADERS = [
    { label: 'Rig',    fade: false },
    { label: 'TH/s',  fade: false },
    { label: 'J/T',   fade: false },
    { label: 'Up%',   fade: true  },
    { label: 'Shares', fade: true },
    { label: 'ASIC°', fade: true  },
    { label: 'VR°',   fade: true  },
    { label: 'Watts',  fade: true  },
  ];

  const showStubs = bitaxe.miners.length === 0 && !bitaxe.loading;

  // Shared style fragments
  const tnum = {
    fontFamily: T.mono, fontSize: u(11), textAlign: 'right',
    fontFeatureSettings: '"tnum"', whiteSpace: 'nowrap',
  };

  return (
    <div style={{ marginBottom: u(4) }}>

      {/* Masthead */}
      <div style={{
        borderTop: `${u(3)} solid ${T.ink}`,
        borderBottom: `1px solid ${T.ink}`,
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        padding: `${u(5)} 0`, marginBottom: u(14),
      }}>
        <span style={{
          fontFamily: T.sans, fontSize: u(10), fontWeight: 700,
          letterSpacing: u(2), textTransform: 'uppercase', color: T.ink, whiteSpace: 'nowrap',
        }}>
          Field Report
        </span>
        <span style={{
          fontFamily: T.body, fontSize: u(10), fontStyle: 'italic',
          color: T.ink3, whiteSpace: 'nowrap',
        }}>
          {onlineCount}/{minerCount} active
        </span>
      </div>

      {/* Pull-quote hero */}
      <div ref={heroWrapRef} style={{ borderLeft: `${u(3)} solid ${T.ink}`, paddingLeft: u(12), marginBottom: u(14) }}>
        {/* height is locked to first-measured font size (px) to prevent layout shift on data
            refresh. Safe because lineHeight:1 makes line-box height === font size, and
            whiteSpace:nowrap prevents wrapping — removing either breaks this invariant. */}
        <div style={{
          fontFamily: T.serif, fontSize: heroFontSize ? heroFontSize + 'px' : u(38),
          fontWeight: 800, fontStyle: 'italic',
          color: oddsOneIn ? T.ink : T.ink4, lineHeight: 1, letterSpacing: -0.5,
          fontFeatureSettings: '"tnum"', whiteSpace: 'nowrap',
          height: heroSlotRef.current ? heroSlotRef.current + 'px' : undefined,
        }}>
          {oddsOneIn ? `1-in-${oddsOneIn.toLocaleString()}` : '1-in-—'}
        </div>
        <div style={{
          fontFamily: T.body, fontSize: u(12), fontStyle: 'italic',
          color: T.ink2, marginTop: u(5), lineHeight: 1.45,
        }}>
          odds of finding a block today —<br />
          {onlineCount > 0
            ? `${totalHashTH.toFixed(2)} TH/s · ${fmtPower(totalPower)}${errRate ? ` · ${errRate}% err` : ''} across ${onlineCount} active ${onlineCount === 1 ? 'rig' : 'rigs'}`
            : 'no rigs online'}
        </div>
      </div>

      {/*
        Single flat grid — header, data rows, and fleet are all direct children
        of one grid container so every column is guaranteed to align perfectly.
      */}
      <div style={{ display: 'grid', gridTemplateColumns: GRID, columnGap: u(4), alignItems: 'center' }}>

        {/* ── Column headers ── */}
        <div key="rule-hdr-top" style={{ gridColumn: '1 / -1', borderTop: `1px solid ${T.rule2}`, padding: 0 }} />
        {HEADERS.map(({ label, fade }, i) => (
          <div key={`h${i}`} style={{
            fontFamily: T.sans, fontSize: u(8), fontWeight: 700,
            letterSpacing: u(1.1), textTransform: 'uppercase',
            color: fade ? T.ink4 : T.ink3,
            textAlign: i > 0 ? 'right' : 'left',
            whiteSpace: 'nowrap',
            padding: i === 0 ? `${u(3)} 0 ${u(3)} ${u(11)}` : `${u(3)} 0`,
          }}>
            {label}
          </div>
        ))}
        <div key="rule-hdr-bot" style={{ gridColumn: '1 / -1', borderTop: `1px solid ${T.rule2}`, padding: 0 }} />

        {/* ── No miners stub ── */}
        {showStubs && (
          <div style={{
            gridColumn: '1 / -1',
            padding: `${u(8)} 0`,
            borderBottom: `1px solid ${T.rule3}`,
            fontFamily: T.mono, fontSize: u(11), color: T.ink4, textAlign: 'center',
          }}>
            No miners configured
          </div>
        )}

        {/* ── Data rows ── */}
        {bitaxe.miners.map((miner, ri) => {
          const status = getMinerStatus(miner);
          const isOff  = status === 'unreachable';
          const md     = miner.data;

          const hr       = md ? (md.hashRate || 0) / 1000 : 0;
          const watts    = md?.power || 0;
          const eff      = hr > 0 ? watts / hr : 0;
          const temp     = md ? (md.temp || md.temperature || 0) : 0;
          const vrT      = md?.vrTemp ?? null;
          const upSec    = md?.uptimeSeconds ?? null;
          const upPct    = upSec != null ? Math.min(99.9, (upSec / 86400) * 100) : null;
          const accS     = md?.sharesAccepted || 0;
          const rejS     = md?.sharesRejected || 0;
          const pwrLimit = md?.powerLimit || null;

          const rowBase = {
            padding: `${u(5)} 0`,
            opacity: isOff ? 0.4 : 1,
          };

          return [
            // Name + dot
            <div key={`${ri}-0`} style={{ ...rowBase, display: 'flex', alignItems: 'flex-start' }}>
              <Dot status={status} />
              <span style={{ fontFamily: T.sans, fontSize: u(11), fontWeight: 600, color: T.ink, overflowWrap: 'break-word', lineHeight: 1.3 }}>
                {getMinerName(miner).split('_').map((part, i) => (
                  <React.Fragment key={i}>{i > 0 && <>{`_`}<wbr /></>}{part}</React.Fragment>
                ))}
              </span>
            </div>,
            // TH/s
            <div key={`${ri}-1`} style={{ ...rowBase, ...tnum, color: T.ink }}>
              {isOff ? '—' : hr.toFixed(2)}
            </div>,
            // J/T
            <div key={`${ri}-2`} style={{ ...rowBase, ...tnum, color: eff > 25 ? T.red : T.ink }}>
              {isOff ? '—' : eff.toFixed(1)}
            </div>,
            // Up%
            <div key={`${ri}-3`} style={{ ...rowBase, ...tnum, color: upPct != null && upPct < 80 ? T.red : T.ink2 }}>
              {isOff ? '—' : (upPct != null ? `${upPct.toFixed(0)}%` : '—')}
            </div>,
            // Shares
            <div key={`${ri}-4`} style={{ ...rowBase, ...tnum, color: T.ink2 }}>
              {isOff ? '—' : (
                <>{accS.toLocaleString()}<span style={{ color: rejS > 50 ? T.red : T.ink4 }}> /{rejS}</span></>
              )}
            </div>,
            // ASIC°
            <div key={`${ri}-5`} style={{ ...rowBase, ...tnum, color: temp > 69 ? T.red : T.ink2 }}>
              {isOff ? '—' : `${temp.toFixed(1)}°`}
            </div>,
            // VR°
            <div key={`${ri}-6`} style={{ ...rowBase, ...tnum, color: vrT != null && vrT > 69 ? T.red : T.ink2 }}>
              {isOff ? '—' : (vrT != null ? `${vrT.toFixed(1)}°` : '—')}
            </div>,
            // Watts
            <div key={`${ri}-7`} style={{ ...rowBase, ...tnum, color: pwrLimit && watts > pwrLimit ? T.red : T.ink2 }}>
              {isOff ? '—' : `${Math.round(watts)}W`}
            </div>,
            // Separator — full-width rule between miners (fleet rule covers the last one)
            ri < bitaxe.miners.length - 1
              ? <div key={`rule-row-${ri}`} style={{ gridColumn: '1 / -1', borderTop: `1px solid ${T.rule3}`, padding: 0 }} />
              : null,
          ];
        })}

        {/* ── Fleet totals ── */}
        {bitaxe.miners.length > 0 && (() => {
          const fleetBase = { padding: `${u(5)} 0` };
          const ft = { ...tnum, fontWeight: 700, padding: `${u(5)} 0` };
          return [
            <div key="rule-fleet" style={{ gridColumn: '1 / -1', borderTop: `1px solid ${T.ink}`, padding: 0 }} />,
            <div key="f0" style={{ ...fleetBase, fontFamily: T.sans, fontSize: u(9), fontWeight: 700, letterSpacing: u(1.1), textTransform: 'uppercase', color: T.ink, display: 'flex', alignItems: 'center', whiteSpace: 'nowrap' }}>
              Fleet
            </div>,
            <div key="f1" style={{ ...ft, color: T.ink }}>{totalHashTH.toFixed(2)}</div>,
            <div key="f2" style={{ ...ft, color: avgEff > 25 ? T.red : T.ink }}>{avgEff.toFixed(1)}</div>,
            <div key="f3" style={{ ...ft, color: avgUp != null && avgUp < 80 ? T.red : T.ink }}>{avgUp != null ? `${avgUp.toFixed(0)}%` : '—'}</div>,
            <div key="f4" style={{ ...ft, color: T.ink }}>
              {totalAcc.toLocaleString()}<span style={{ color: totalRej > 200 ? T.red : T.ink4 }}> /{totalRej}</span>
            </div>,
            <div key="f5" style={{ ...ft, color: avgAsic > 69 ? T.red : T.ink }}>{Math.round(avgAsic)}°</div>,
            <div key="f6" style={{ ...ft, color: avgVr != null && avgVr > 69 ? T.red : T.ink }}>{avgVr != null ? `${Math.round(avgVr)}°` : '—'}</div>,
            <div key="f7" style={{ ...ft, color: T.ink }}>{fmtPower(totalPower)}</div>,
          ];
        })()}

      </div>
    </div>
  );
}







function MastheadPanel({ apiUrl, ips, prefs, onSave, onClose }) {
  const T = useT();
  const [url, setUrl] = React.useState(apiUrl);
  const [ipsText, setIpsText] = React.useState(ips.join(', '));

  const [cityQuery, setCityQuery] = React.useState(prefs.cityName);
  const [geoResults, setGeoResults] = React.useState(null);
  const [geoLoading, setGeoLoading] = React.useState(false);
  const [pendingLat, setPendingLat] = React.useState(prefs.lat);
  const [pendingLng, setPendingLng] = React.useState(prefs.lng);
  const [pendingCityName, setPendingCityName] = React.useState(prefs.cityName);
  const [timeFormat, setTimeFormat] = React.useState(prefs.timeFormat);
  const [tempUnit, setTempUnit] = React.useState(prefs.tempUnit);

  const handleSearch = async () => {
    if (!cityQuery.trim()) return;
    setGeoLoading(true);
    setGeoResults(null);
    try {
      const r = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityQuery.trim())}&count=5&language=en&format=json`
      );
      if (!r.ok) throw new Error('geo');
      const j = await r.json();
      setGeoResults(Array.isArray(j.results) && j.results.length > 0 ? j.results : []);
    } catch {
      setGeoResults('error');
    } finally {
      setGeoLoading(false);
    }
  };

  const handleSelectCity = (result) => {
    const label = [result.name, result.admin1, result.country_code].filter(Boolean).join(', ');
    setCityQuery(label);
    setPendingLat(result.latitude);
    setPendingLng(result.longitude);
    setPendingCityName(label);
    setGeoResults(null);
  };

  const handleSave = () => {
    const newIps = ipsText
      .split(/[\s,]+/)
      .map((s) => s.trim())
      .filter(Boolean);

      lng: pendingLng,
      cityName: pendingCityName,
      timeFormat,

              </div>
